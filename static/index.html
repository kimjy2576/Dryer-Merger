  Q_Drum_Sen:'드럼 현열 [W]',Q_Drum_Lat:'드럼 잠열 [W]',Q_Drum_Total:'드럼 총 열량 [W]',
  // 엔탈피/엔트로피
  h_Comp_In_ref:'압축기 입구 엔탈피 [kJ/kg]',h_Comp_Out_ref:'압축기 출구 엔탈피 [kJ/kg]',
  h_Cond_In_ref:'응축기 입구 엔탈피 [kJ/kg]',h_Cond_Out_ref:'응축기 출구 엔탈피 [kJ/kg]',
  h_Eva_In_ref:'증발기 입구 엔탈피 [kJ/kg]',h_Eva_Out_ref:'증발기 출구 엔탈피 [kJ/kg]',
  h_Cond_In_MAir:'응축기 입구 공기 엔탈피 [kJ/kg]',h_Cond_Out_MAir:'응축기 출구 공기 엔탈피 [kJ/kg]',
  h_Eva_In_MAir:'증발기 입구 공기 엔탈피 [kJ/kg]',
  s_Comp_In_ref:'압축기 입구 엔트로피 [kJ/kg·K]',s_Comp_Out_ref:'압축기 출구 엔트로피 [kJ/kg·K]',
  v_Comp_In_ref:'압축기 입구 비체적 [m³/kg]',v_Comp_Out_ref:'압축기 출구 비체적 [m³/kg]',
  Quality_x:'건도 [-]',
  // 제어
  Ctrl_Comp_Hz:'압축기 주파수 [Hz]',HP_CompCurrentHz:'압축기 주파수 [Hz]',HP_CompTargetHz:'압축기 목표 주파수 [Hz]',
  HP_F_Temp:'F 온도 [°C]',HP_EEV_Position:'팽창밸브 개도 [pulse]',HP_FanSpeed:'팬 회전수 [rpm]',
  'HP Fan Q Current':'팬 전류 [A]','HP Comp Current':'압축기 전류 [A]',
  HP_SuperHeatDegree:'과열도 (센서) [K]',HP_CoolingFan:'쿨링팬 [-]',HP_CompIpmTemp:'IPM 온도 [°C]',HP_FanIpmTemp:'팬 IPM 온도 [°C]',
  Ctrl_DryMotion:'건조 모션 [-]',
  // 기타 merged
  Current_RPM:'현재 RPM [rpm]',Request_RPM:'목표 RPM [rpm]',Wash_Temp:'세탁 온도 [°C]',Dry_Temp:'건조 온도 [°C]',
  fTemp_calc:'F온도 계산 [°C]',Time_min:'시간 [min]',Time_sec:'시간 [sec]',
};
const yTitle=k=>VL[k]?`<b>${VL[k]}</b>`:`<b>${k}</b>`;

// ═══ Viewer: 라인차트 ═══
function VwChart({cases,caseVis,lw,chartH,chartW,dragMode,xGap,yGap}){
  const allVars=useMemo(()=>{
    if(!cases?.length)return[];
    const s=new Set();
    cases.forEach(c=>{if(c?.data)Object.keys(c.data).forEach(k=>{if(!/^Time/i.test(k))s.add(k)})});
    return[...s].sort();
  },[cases]);

  // 탭 = 카테고리 (생성/삭제 가능)
  const initTabs=()=>{
    const ts=VW_CATS.map((c,i)=>{
      const av=c.vars.filter(k=>cases.some(cs=>cs?.data?.[k]));
      const r=c.rows||3,cl=c.cols||3;
      return{id:i,name:c.name,rows:r,cols:cl,plots:av.slice(0,r*cl)}
    });
    return ts;
  };
  const[tabs,setTabs]=useState(()=>initTabs());
  const[tabIdx,setTabIdx]=useState(0);
  // cases 변경 시 탭 재초기화
  useEffect(()=>{if(cases?.length)setTabs(initTabs())},[allVars.length]);

  const tab=tabs[tabIdx]||tabs[0];
  const updateTab=(upd)=>setTabs(ts=>ts.map((t,i)=>i===tabIdx?{...t,...upd}:t));
  const removeTab=(i)=>{if(tabs.length<=1)return;setTabs(ts=>ts.filter((_,j)=>j!==i));setTabIdx(ti=>Math.min(ti,tabs.length-2))};
  const addCustomTab=()=>{
    const name=prompt('새 탭 이름:','커스텀');if(!name)return;
    // 현재 탭의 변수/행열을 복제
    setTabs(ts=>[...ts,{id:Date.now(),name,rows:tab.rows,cols:tab.cols,plots:[...tab.plots],yranges:{...(tab.yranges||{})}}]);
    setTabIdx(tabs.length);
  };

  const[smOn,setSmOn]=useState(false);const[smM,setSmM]=useState('SMA');const[smW,setSmW]=useState(10);
  const[err,setErr]=useState('');
  const ref=useRef(null);

  // 구간
  const[zones,setZones]=useState([]);const[zs,setZs]=useState('');const[ze,setZe]=useState('');
  const addZone=()=>{const a=parseFloat(zs),b=parseFloat(ze);if(isNaN(a)||isNaN(b)||a>=b)return;setZones(p=>[...p,{id:Date.now(),start:a,end:b}]);setZs('');setZe('')};

  // 변수 조작
  const setPlotVar=(si,v)=>{const np=[...tab.plots];np[si]=v;updateTab({plots:np})};
  const addPlot=()=>{const rest=allVars.filter(k=>!tab.plots.includes(k));if(rest.length)updateTab({plots:[...tab.plots,rest[0]]})};
  const removePlot=(i)=>updateTab({plots:tab.plots.filter((_,j)=>j!==i)});
  const movePlot=(from,to)=>{if(from===to)return;const np=[...tab.plots];const[m]=np.splice(from,1);np.splice(to,0,m);updateTab({plots:np})};
  const setYRange=(k,idx,val)=>{const yr={...(tab.yranges||{})};if(!yr[k])yr[k]=[null,null];yr[k][idx]=val===''?null:+val;updateTab({yranges:yr})};
  const clearYRange=(k)=>{const yr={...(tab.yranges||{})};delete yr[k];updateTab({yranges:yr})};

  // Fit
  const fitAll=()=>{if(!ref.current)return;try{
    const upd={};tab.plots.slice(0,tab.rows*tab.cols).forEach((_,i)=>{
      const ax=i===0?'':''.concat(i+1);
      upd['xaxis'+ax+'.autorange']=true;upd['yaxis'+ax+'.autorange']=true});
    Plotly.relayout(ref.current,upd)}catch(e){console.error(e)}};

  const finalW=chartW>0?chartW:undefined;

  useEffect(()=>{
    if(!ref.current||!tab.plots.length)return;setErr('');
    try{
      const nPlots=tab.plots.slice(0,tab.rows*tab.cols);
      const actR=Math.max(1,Math.min(tab.rows,Math.ceil(nPlots.length/tab.cols)));
      const actC=Math.max(1,Math.min(tab.cols,nPlots.length));
      const tr=[];const shapes=[];
      const perRowH=Math.max(220,Math.round(chartH/Math.max(actR,1)));
      const totalH=actR*perRowH;

      const lo={grid:{rows:actR,columns:actC,pattern:'independent',xgap:xGap,ygap:yGap},height:totalH,width:finalW,margin:{t:30,b:50,l:80,r:30},paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',font:{family:'var(--font)',color:'#3a3a4e',size:11},showlegend:true,legend:{orientation:'h',y:1.06,x:.5,xanchor:'center',font:{size:11}},hovermode:'x unified',dragmode:dragMode==='pan'?'pan':'zoom',shapes};
      nPlots.forEach((k,pi)=>{
        const xk='x'+(pi+1>1?pi+1:''),yk='y'+(pi+1>1?pi+1:'');
        lo['xaxis'+(pi+1)]={title:Math.floor(pi/actC)+1===actR?{text:'<b>Time</b> [min]',font:{size:11}}:undefined,gridcolor:'rgba(0,0,0,0.06)',tickfont:{size:10},zeroline:false,linecolor:'rgba(0,0,0,0.15)',linewidth:1,mirror:true};
        lo['yaxis'+(pi+1)]={title:{text:yTitle(k),font:{size:11}},gridcolor:'rgba(0,0,0,0.06)',tickfont:{size:10},zeroline:false,linecolor:'rgba(0,0,0,0.15)',linewidth:1,mirror:true,
          ...(tab.yranges?.[k]?.length===2&&tab.yranges[k][0]!=null&&tab.yranges[k][1]!=null?{range:tab.yranges[k],autorange:false}:{})};
        zones.forEach((z,zi)=>{shapes.push({type:'rect',xref:xk,yref:yk+' domain',x0:z.start,x1:z.end,y0:0,y1:1,fillcolor:VW_ZC[zi%VW_ZC.length],line:{color:VW_ZB[zi%VW_ZB.length],width:1,dash:'dot'},layer:'below'})});
        cases.forEach((cs,ci)=>{
          if(!cs?.data||!caseVis[cs.name]||!cs.data[k])return;
          const xArr=cs.data.Time_min||cs.data.Time_sec||cs.data.Time;
          if(!xArr?.length)return;
          let yArr=cs.data[k];if(!yArr?.length)return;
          if(smOn&&yArr.length>3)try{yArr=vSmooth(yArr,smM,smW)}catch(e){}
          tr.push({x:xArr,y:yArr,type:'scattergl',mode:'lines',name:cs.label||cs.name,legendgroup:cs.name,showlegend:pi===0,line:{color:VW_COLORS[ci%VW_COLORS.length],width:lw},xaxis:xk,yaxis:yk,hovertemplate:'%{y:.2f}<extra>'+(cs.label||cs.name)+'</extra>'});
        });
      });
      if(tr.length)Plotly.react(ref.current,tr,lo,{responsive:!finalW,displaylogo:false,scrollZoom:true});
      else setErr('표시할 데이터 없음');
    }catch(e){console.error('VwChart:',e);setErr('렌더링 오류: '+e.message)}
  },[cases,caseVis,lw,chartH,finalW,tab,smOn,smM,smW,dragMode,zones,xGap,yGap]);

  // 구간 통계
  const zoneStats=useMemo(()=>zones.map(z=>{
    const stats=tab.plots.slice(0,tab.rows*tab.cols).map(k=>{
      const r={key:k};cases.forEach(cs=>{if(!caseVis[cs.name]||!cs?.data?.[k])return;
        const t=cs.data.Time_min||cs.data.Time_sec||cs.data.Time;if(!t)return;
        const vals=[];t.forEach((tv,i)=>{if(tv>=z.start&&tv<=z.end&&cs.data[k][i]!=null)vals.push(cs.data[k][i])});
        if(vals.length)r[cs.name]={min:Math.min(...vals).toFixed(2),avg:(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2),max:Math.max(...vals).toFixed(2)}});
      return r});
    return{...z,stats}}),[zones,tab,cases,caseVis]);
  const visCase=cases.filter(c=>caseVis[c.name]);

  return(<div>
    {/* 카테고리 탭 */}
    <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
      {tabs.map((t,i)=><div key={t.id} style={{display:'flex',alignItems:'center',gap:0}}>
        <button className={`bt bs ${tabIdx===i?'on':''}`} onClick={()=>setTabIdx(i)} style={{borderRadius:tabs.length>1&&i===tabIdx?'6px 0 0 6px':'6px',fontSize:11}}>{t.name}</button>
        {tabs.length>1&&tabIdx===i&&<button onClick={()=>removeTab(i)} style={{padding:'2px 5px',fontSize:9,border:'1px solid var(--bd2)',background:'var(--bg)',color:'var(--red)',borderRadius:'0 6px 6px 0',cursor:'pointer',fontFamily:'var(--font)'}}>×</button>}
      </div>)}
      <button className="bt bs" onClick={addCustomTab} style={{fontSize:10}}>+ 탭 추가</button>
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <button className="bt bs" onClick={()=>{
        const cfg={version:1,type:'viewer_chart_settings',tabs:tabs.map(t=>({name:t.name,rows:t.rows,cols:t.cols,plots:t.plots,yranges:t.yranges||{}})),tabIdx,smOn,smM,smW,zones,timestamp:new Date().toISOString()};
        const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='viewer_chart_settings.json';a.click()
      }} style={{fontSize:10}}>💾 저장</button>
      <button className="bt bs" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=ev=>{
        const f=ev.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=e=>{try{
          const c=JSON.parse(e.target.result);if(c.tabs){
            setTabs(c.tabs.map((t,i)=>({...t,id:Date.now()+i})));setTabIdx(c.tabIdx||0);
            if(c.smOn!=null)setSmOn(c.smOn);if(c.smM)setSmM(c.smM);if(c.smW)setSmW(c.smW);
            if(c.zones)setZones(c.zones);
          }}catch(er){alert('설정 파일 파싱 실패')}};rd.readAsText(f)};inp.click()
      }} style={{fontSize:10}}>📂 불러오기</button>
    </div>

    {/* 컨트롤 */}
    <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:6,flexWrap:'wrap',fontSize:11}}>
      <span style={{fontWeight:500,color:'var(--tx2)'}}>행:</span>
      <select value={tab.rows} onChange={e=>{const r=+e.target.value;const need=r*tab.cols;
        if(tab.plots.length<need){const rest=allVars.filter(k=>!tab.plots.includes(k));updateTab({rows:r,plots:[...tab.plots,...rest.slice(0,need-tab.plots.length)]})}else{updateTab({rows:r})}
      }} style={{width:50,fontSize:12,padding:'3px 6px',fontWeight:500}}>{[1,2,3,4].map(n=><option key={n} value={n}>{n}행</option>)}</select>
      <span style={{fontWeight:500,color:'var(--tx2)'}}>열:</span>
      <select value={tab.cols} onChange={e=>{const c=+e.target.value;const need=tab.rows*c;
        if(tab.plots.length<need){const rest=allVars.filter(k=>!tab.plots.includes(k));updateTab({cols:c,plots:[...tab.plots,...rest.slice(0,need-tab.plots.length)]})}else{updateTab({cols:c})}
      }} style={{width:50,fontSize:12,padding:'3px 6px',fontWeight:500}}>{[1,2,3,4].map(n=><option key={n} value={n}>{n}열</option>)}</select>
      <span style={{fontSize:10,color:'var(--tx3)',fontFamily:'var(--mono)'}}>{tab.rows}×{tab.cols}={tab.rows*tab.cols}개</span>
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <label style={{fontSize:12,display:'flex',alignItems:'center',gap:3}}><input type="checkbox" checked={smOn} onChange={e=>setSmOn(e.target.checked)} style={{accentColor:'var(--teal)'}}/>스무딩</label>
      {smOn&&<><select value={smM} onChange={e=>setSmM(e.target.value)} style={{width:65}}><option>SMA</option><option>EMA</option></select><input type="range" min="3" max="120" value={smW} onChange={e=>setSmW(+e.target.value)} style={{width:100}}/><span className="it">{smW}</span></>}
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <button className="bt bs" onClick={fitAll}>📐 Fit</button>
      <button className="bt bs" onClick={fitAll}>🔄 리셋</button>
    </div>

    {/* 변수 선택 + 순서 변경 */}
    <div style={{display:'flex',gap:4,marginBottom:6,flexWrap:'wrap',alignItems:'center'}}>
      {tab.plots.slice(0,tab.rows*tab.cols).map((k,i)=>{const yr=tab.yranges?.[k];const hasR=yr&&(yr[0]!=null||yr[1]!=null);
        return(<div key={i} style={{display:'flex',alignItems:'center',gap:2,padding:'2px 4px',background:'var(--bg2)',border:'1px solid var(--bd)',borderRadius:5}}>
        {i>0&&<button onClick={()=>movePlot(i,i-1)} style={{fontSize:9,border:0,background:0,color:'var(--tx3)',cursor:'pointer',padding:0}}>◀</button>}
        <select value={k} onChange={e=>setPlotVar(i,e.target.value)} style={{fontSize:10,padding:'2px 3px',width:180,background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:4,color:'var(--tx)'}}>
          {allVars.map(v=><option key={v} value={v}>{VL[v]||v}</option>)}
        </select>
        <input value={yr?.[0]??''} onChange={e=>setYRange(k,0,e.target.value)} placeholder="min" title="Y축 최소" style={{width:40,fontSize:9,padding:'2px 3px',background:hasR?'rgba(59,130,246,.08)':'var(--bg)',border:'1px solid '+(hasR?'rgba(59,130,246,.3)':'var(--bd2)'),borderRadius:3,color:'var(--tx)',fontFamily:'var(--mono)',textAlign:'center'}}/>
        <input value={yr?.[1]??''} onChange={e=>setYRange(k,1,e.target.value)} placeholder="max" title="Y축 최대" style={{width:40,fontSize:9,padding:'2px 3px',background:hasR?'rgba(59,130,246,.08)':'var(--bg)',border:'1px solid '+(hasR?'rgba(59,130,246,.3)':'var(--bd2)'),borderRadius:3,color:'var(--tx)',fontFamily:'var(--mono)',textAlign:'center'}}/>
        {hasR&&<button onClick={()=>clearYRange(k)} title="Y축 자동" style={{fontSize:8,border:0,background:0,color:'var(--blue)',cursor:'pointer',padding:0}}>↺</button>}
        {i<tab.plots.length-1&&<button onClick={()=>movePlot(i,i+1)} style={{fontSize:9,border:0,background:0,color:'var(--tx3)',cursor:'pointer',padding:0}}>▶</button>}
        <button onClick={()=>removePlot(i)} style={{fontSize:9,border:0,background:0,color:'var(--red)',cursor:'pointer',padding:'0 2px'}}>×</button>
      </div>)})}
      <button className="bt bs" onClick={addPlot} style={{fontSize:10}}>+ 변수</button>
    </div>

    {err&&<div style={{padding:10,margin:'6px 0',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,fontSize:12,color:'var(--red)'}}>{err}</div>}
    {tab.plots.length>0?<div className="cd" style={{overflowX:'auto',padding:4}}><div ref={ref}/></div>
    :<div className="cd"><div className="it" style={{padding:20,textAlign:'center'}}>변수를 추가하세요.</div></div>}

    {/* 구간 */}
    <div style={{display:'flex',gap:6,alignItems:'center',marginTop:8,padding:'8px 12px',background:'var(--bg2,var(--bg3))',border:'1px solid var(--bd)',borderRadius:8,flexWrap:'wrap'}}>
      <span style={{fontSize:11,color:'var(--tx2)'}}>구간:</span>
      <input value={zs} onChange={e=>setZs(e.target.value)} placeholder="시작(min)" style={{width:80,fontSize:11,padding:'3px 6px'}}/>
      <span style={{color:'var(--tx3)'}}>~</span>
      <input value={ze} onChange={e=>setZe(e.target.value)} placeholder="종료(min)" style={{width:80,fontSize:11,padding:'3px 6px'}}/>
      <button className="bt bs" onClick={addZone}>추가</button>
      {zones.map((z,i)=><span key={z.id} style={{fontSize:10,padding:'2px 8px',background:VW_ZC[i%VW_ZC.length],border:'1px solid '+VW_ZB[i%VW_ZB.length],borderRadius:12,display:'flex',alignItems:'center',gap:4}}>
        {z.start}~{z.end}<button onClick={()=>setZones(p=>p.filter(x=>x.id!==z.id))} style={{border:0,background:'none',color:'var(--red)',cursor:'pointer',fontSize:10,padding:0}}>×</button>
      </span>)}
      {zones.length>0&&<button className="bt bs" onClick={()=>setZones([])} style={{fontSize:10}}>전체 삭제</button>}
    </div>

    {/* 구간 통계 */}
    {zoneStats.length>0&&<div style={{marginTop:8,border:'1px solid var(--bd)',borderRadius:8,overflow:'auto',maxHeight:250}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:11,fontFamily:'var(--mono)'}}>
        <thead><tr style={{background:'var(--bg3)'}}>
          <th style={{padding:'5px 8px',textAlign:'left',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>구간</th>
          <th style={{padding:'5px 8px',textAlign:'left',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>변수</th>
          {visCase.map(c=><th key={c.name} colSpan={3} style={{padding:'5px 8px',textAlign:'center',color:'var(--tx2)',position:'sticky',top:0,background:'var(--bg3)'}}>{c.name}</th>)}
        </tr><tr style={{background:'var(--bg3)'}}>
          <th/><th/>
          {visCase.map(c=><React.Fragment key={c.name}><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--tx3)',position:'sticky',top:28,background:'var(--bg3)'}}>Min</th><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--teal)',position:'sticky',top:28,background:'var(--bg3)'}}>Avg</th><th style={{padding:'3px 6px',textAlign:'right',fontSize:9,color:'var(--tx3)',position:'sticky',top:28,background:'var(--bg3)'}}>Max</th></React.Fragment>)}
        </tr></thead>
        <tbody>{zoneStats.map(z=>z.stats.map((st,si)=><tr key={z.id+'-'+si} style={{borderTop:'1px solid var(--bd)'}}>
          {si===0&&<td rowSpan={z.stats.length} style={{padding:'4px 8px',color:'var(--teal)',verticalAlign:'top'}}>{z.start}~{z.end}</td>}
          <td style={{padding:'4px 8px'}}>{st.key}</td>
          {visCase.map(c=>{const d=st[c.name];return d?<React.Fragment key={c.name}><td style={{padding:'3px 6px',textAlign:'right'}}>{d.min}</td><td style={{padding:'3px 6px',textAlign:'right',color:'var(--teal)'}}>{d.avg}</td><td style={{padding:'3px 6px',textAlign:'right'}}>{d.max}</td></React.Fragment>:<React.Fragment key={c.name}><td style={{textAlign:'center'}}>-</td><td style={{textAlign:'center'}}>-</td><td style={{textAlign:'center'}}>-</td></React.Fragment>})}
        </tr>))}</tbody>
      </table>
    </div>}
  </div>)
}

// ═══ Viewer: 습공기 선도 ═══
function VwPsych({cases,caseVis,lw,chartH,chartW,dragMode}){
  const findCol=(d,names)=>{for(const n of names){if(d[n])return d[n]}return null};
  const[timeR,setTimeR]=useState(.5);
  const[autoFit,setAutoFit]=useState(true);
  const[fixedRange,setFixedRange]=useState(null);
  const ref=useRef(null);
  const timeIdx=useMemo(()=>cases.map(cs=>{const t=cs?.data?.Time_min||cs?.data?.Time_sec||cs?.data?.Time;if(!t||!t.length)return 0;const tgt=t[t.length-1]*timeR;let b=0;for(let i=1;i<t.length;i++){if(Math.abs(t[i]-tgt)<Math.abs(t[b]-tgt))b=i}return b}),[cases,timeR]);
  const curT=cases[0]?.data?.Time_min?.[timeIdx[0]]||cases[0]?.data?.Time_sec?.[timeIdx[0]]||0;

  // 누락 체크
  const dataStatus=useMemo(()=>{
    const found=new Set();cases.forEach(c=>{if(c?.data)Object.keys(c.data).forEach(k=>found.add(k))});
    const has=k=>found.has(k);
    const hasPt1=has('T_Air_Eva_In')&&has('AH_Eva_In');
    const hasPt2=(has('T_Air_Eva_Out')||has('T_Eva_Out'))&&has('AH_Cond_In');
    const hasPt3=has('T_Air_Cond_Out')&&has('AH_Cond_Out');
    return{hasPt1,hasPt2,hasPt3,anyPt:hasPt1||hasPt2||hasPt3,found:[...found]};
  },[cases]);

  useEffect(()=>{if(!ref.current)return;
    const fW=chartW>0?chartW:undefined;
    const tr=[...PSYCH_BG];
    const allT=[],allW=[];
    cases.forEach((cs,ci)=>{if(!caseVis[cs.name])return;const i=timeIdx[ci];const d=cs.data;if(!d)return;
      const pts=[];
      if(d.T_Air_Eva_In?.[i]!=null&&d.AH_Eva_In?.[i]!=null)pts.push([d.T_Air_Eva_In[i],d.AH_Eva_In[i],'①Eva In']);
      const tEvaOut=d.T_Air_Eva_Out?.[i]??d.T_Eva_Out?.[i];
      if(tEvaOut!=null&&d.AH_Cond_In?.[i]!=null)pts.push([tEvaOut,d.AH_Cond_In[i],'②Eva Out']);
      if(d.T_Air_Cond_Out?.[i]!=null&&d.AH_Cond_Out?.[i]!=null)pts.push([d.T_Air_Cond_Out[i],d.AH_Cond_Out[i],'③Cond Out']);
      pts.forEach(p=>{allT.push(p[0]);allW.push(p[1])});
      if(pts.length){
        const xs=[...pts.map(p=>p[0]),pts[0][0]],ys=[...pts.map(p=>p[1]),pts[0][1]],tx=[...pts.map(p=>p[2]),''];
        tr.push({x:xs,y:ys,mode:'lines+markers+text',text:tx,textposition:'top center',textfont:{size:12,color:VW_COLORS[ci%VW_COLORS.length],family:'var(--font)'},marker:{size:12,line:{width:1,color:'#fff'}},line:{color:VW_COLORS[ci%VW_COLORS.length],width:Math.max(lw,2.5)},name:cs.label||cs.name,hovertemplate:'T=%{x:.1f}°C<br>W=%{y:.4f}<extra></extra>'})}
    });
    // 데이터 기반 축 범위
    let xRange=[-5,70],yRange=[0,.032];
    if(allT.length>0){
      const tMin=Math.min(...allT),tMax=Math.max(...allT),tPad=Math.max((tMax-tMin)*.3,5);
      const wMin=Math.min(...allW),wMax=Math.max(...allW),wPad=Math.max((wMax-wMin)*.3,.002);
      const calcX=[Math.max(-5,tMin-tPad),Math.min(70,tMax+tPad)];
      const calcY=[Math.max(0,wMin-wPad),wMax+wPad];
      if(!fixedRange)setFixedRange({x:calcX,y:calcY});
      if(autoFit){xRange=calcX;yRange=calcY}
      else if(fixedRange){xRange=fixedRange.x;yRange=fixedRange.y}
    }
    try{Plotly.react(ref.current,tr,{
      title:{text:'<b>습공기 선도</b>'+(dataStatus.anyPt?' (t='+curT.toFixed(1)+' min)':''),font:{size:14},y:.98,yanchor:'top'},
      xaxis:{title:{text:'<b>건구온도</b> [°C]',font:{size:12}},range:xRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:{size:11}},
      yaxis:{title:{text:'<b>절대습도</b> [kg/kg]',font:{size:12}},range:yRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:{size:11}},
      height:chartH,width:fW,margin:{t:60,b:60,l:80,r:30},
      paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',
      font:{family:'var(--font)',color:'#3a3a4e',size:11},
      legend:{orientation:'h',y:-.15,x:.5,xanchor:'center',font:{size:11},bgcolor:'rgba(255,255,255,0.8)'},
      hovermode:'closest',dragmode:dragMode==='pan'?'pan':'zoom'
    },{responsive:!fW,displaylogo:false,scrollZoom:true})}catch(e){console.error('VwPsych:',e)}
  },[cases,caseVis,timeIdx,lw,chartH,chartW,dragMode,curT,dataStatus.anyPt,autoFit]);

  const stPts=useMemo(()=>cases.map((cs,ci)=>{if(!caseVis[cs.name])return null;const i=timeIdx[ci];const d=cs.data;if(!d)return null;
    const pts=[];
    if(d.T_Air_Eva_In?.[i]!=null&&d.AH_Eva_In?.[i]!=null){const T=d.T_Air_Eva_In[i],W=d.AH_Eva_In[i];pts.push({lb:'①증발기입구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    const tEO=d.T_Air_Eva_Out?.[i]??d.T_Eva_Out?.[i];
    if(tEO!=null&&d.AH_Cond_In?.[i]!=null){const T=tEO,W=d.AH_Cond_In[i];pts.push({lb:'②증발기출구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    if(d.T_Air_Cond_Out?.[i]!=null&&d.AH_Cond_Out?.[i]!=null){const T=d.T_Air_Cond_Out[i],W=d.AH_Cond_Out[i];pts.push({lb:'③응축기출구',T,W,h:hMoist(T,W),rh:rhFromAH(W,T),dp:dewPt(W),v:specVol(T,W)})}
    return pts.length?{name:cs.label||cs.name,color:VW_COLORS[ci%VW_COLORS.length],pts}:null;
  }).filter(Boolean),[cases,caseVis,timeIdx]);

  // 디버그: 첫 케이스의 실제 값
  const psychDbg=useMemo(()=>{
    const c=cases.find(cs=>caseVis[cs.name]);if(!c?.data)return'활성 케이스 없음';
    const d=c.data,i=timeIdx[cases.indexOf(c)];
    const v=k=>{if(!d[k])return'없음';const val=d[k][i];return val!=null?(typeof val==='number'?val.toFixed(3):String(val)):'null'};
    return`[${c.name}] idx=${i}\n①T_Air_Eva_In=${v('T_Air_Eva_In')} AH_Eva_In=${v('AH_Eva_In')}\n②T_Air_Eva_Out=${v('T_Air_Eva_Out')} T_Eva_Out=${v('T_Eva_Out')} AH_Cond_In=${v('AH_Cond_In')}\n③T_Air_Cond_Out=${v('T_Air_Cond_Out')} AH_Cond_Out=${v('AH_Cond_Out')}`;
  },[cases,caseVis,timeIdx]);

  return(<div>
    {!dataStatus.anyPt&&<div style={{padding:12,margin:'0 0 10px',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,fontSize:12,color:'var(--amber)'}}>
      ⚠️ 습공기 선도: T_Air_Eva_In + AH_Eva_In 등이 필요합니다.
    </div>}
    <div style={{padding:8,margin:'0 0 8px',background:'var(--bg3)',borderRadius:6,fontFamily:'var(--mono)',fontSize:10,whiteSpace:'pre-wrap',color:'var(--tx2)'}}>
      상태: Pt1={dataStatus.hasPt1?'✓':'✗'} Pt2={dataStatus.hasPt2?'✓':'✗'} Pt3={dataStatus.hasPt3?'✓':'✗'}{'\n'}{psychDbg}
    </div>
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10}}>
      <span className="it">시점:</span><input type="range" min="0" max="1" step=".005" value={timeR} onChange={e=>setTimeR(+e.target.value)} style={{flex:1,maxWidth:300}}/>
      <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--teal)',padding:'3px 8px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:5}}>{curT.toFixed(1)} min</span>
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <button className={`bt bs ${autoFit?'on':''}`} onClick={()=>setAutoFit(!autoFit)} style={autoFit?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff',fontSize:10}:{fontSize:10}}>{autoFit?'📐 Auto Fit':'📌 고정'}</button>
      {!autoFit&&<button className="bt bs" onClick={()=>{setFixedRange(null);setAutoFit(true)}} style={{fontSize:10}}>↺ 리셋</button>}
    </div>
    <div className="cd" style={{overflowX:'auto',padding:4}}><div ref={ref}/></div>
    {stPts.length>0&&<div className="cd" style={{marginTop:10}}>
      <div className="ct">습공기 상태점 @ t={curT.toFixed(1)} min</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
      {stPts.map(sp=><div key={sp.name} style={{background:'var(--bg3,#1a1a25)',border:'1px solid var(--bd2)',borderRadius:8,padding:10}}>
        <div style={{fontSize:12,fontWeight:500,marginBottom:6,display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:sp.color}}/>{sp.name}</div>
        {sp.pts.map(p=><div key={p.lb} style={{marginBottom:6}}>
          <div style={{fontSize:11,color:'var(--teal)',marginBottom:2}}>{p.lb}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:2,fontSize:11}}>
            <span>T: <b>{p.T.toFixed(1)}°C</b></span><span>W: <b>{p.W.toFixed(4)}</b></span><span>RH: <b>{(p.rh*100).toFixed(1)}%</b></span>
            <span>h: <b>{p.h.toFixed(1)}</b></span><span>Td: <b>{p.dp.toFixed(1)}°C</b></span><span>v: <b>{p.v.toFixed(3)}</b></span>
          </div>
        </div>)}
      </div>)}
      </div>
    </div>}
  </div>)
}

// ═══ Viewer: P-h 선도 ═══
function VwPh({cases,caseVis,lw,chartH,chartW,dragMode,cfg}){
  const hasRefData=useMemo(()=>cases.some(c=>c?.data?.h_Comp_In_ref||c?.data?.P_Comp_In),[cases]);
  const[timeR,setTimeR]=useState(.5);
  const[autoFit,setAutoFit]=useState(true);
  const[fixedRange,setFixedRange]=useState(null);
  const[refName,setRefName]=useState(cfg?.environment?.refrigerant||'R290');
  const[satData,setSatData]=useState(null);
  const[satErr,setSatErr]=useState('');
  const ref=useRef(null);

  useEffect(()=>{setSatData(null);setSatErr('');
    fetch(`${API}/api/ref-saturation/${encodeURIComponent(refName)}`).then(r=>{if(!r.ok)throw new Error('API 오류');return r.json()}).then(d=>setSatData(d)).catch(e=>setSatErr(e.message))
  },[refName]);

  const timeIdx=useMemo(()=>cases.map(cs=>{const t=cs?.data?.Time_min||cs?.data?.Time_sec||cs?.data?.Time;if(!t||!t.length)return 0;const tgt=t[t.length-1]*timeR;let b=0;for(let i=1;i<t.length;i++){if(Math.abs(t[i]-tgt)<Math.abs(t[b]-tgt))b=i}return b}),[cases,timeR]);
  const curT=cases[0]?.data?.Time_min?.[timeIdx[0]]||cases[0]?.data?.Time_sec?.[timeIdx[0]]||0;

  useEffect(()=>{if(!ref.current||!satData)return;
    const fW=chartW>0?chartW:undefined;
    const s=satData.sat,c=satData.critical;
    const tr=[
      {x:s.hl,y:s.P,mode:'lines',line:{color:'#2563eb',width:2},name:'포화액선',showlegend:false,hoverinfo:'skip'},
      {x:s.hv,y:s.P,mode:'lines',line:{color:'#dc2626',width:2},name:'포화증기선',showlegend:false,hoverinfo:'skip'},
      {x:[c.h],y:[c.P],mode:'markers',marker:{size:12,color:'#1a1a2e',symbol:'diamond',line:{width:2,color:'#fff'}},name:'임계점',showlegend:false,hovertemplate:'<b>임계점</b><br>'+c.P.toFixed(1)+' bar, '+c.T.toFixed(1)+'°C<extra></extra>'}
    ];
    let hasOverlay=false;
    const cycleH=[],cycleP=[];
    cases.forEach((cs,ci)=>{if(!caseVis[cs.name])return;const i=timeIdx[ci];const d=cs.data;if(!d)return;
      if(!d.h_Comp_In_ref?.[i]||!d.P_Comp_In?.[i])return;
      const BA=1.01325;
      const pts=[];
      pts.push({h:d.h_Comp_In_ref[i],P:d.P_Comp_In[i]+BA,lb:'①'});
      if(d.h_Comp_Out_ref?.[i]!=null&&d.P_Comp_Out?.[i]!=null)pts.push({h:d.h_Comp_Out_ref[i],P:d.P_Comp_Out[i]+BA,lb:'②'});
      if(d.h_Cond_Out_ref?.[i]!=null)pts.push({h:d.h_Cond_Out_ref[i],P:(d.P_Comp_Out?.[i]||d.P_Comp_In[i])+BA,lb:'③'});
      if(d.h_Eva_In_ref?.[i]!=null)pts.push({h:d.h_Eva_In_ref[i],P:d.P_Comp_In[i]+BA,lb:'④'});
      pts.forEach(p=>{cycleH.push(p.h);cycleP.push(p.P)});
      if(pts.length>1){pts.push(pts[0]);hasOverlay=true;
        tr.push({x:pts.map(p=>p.h),y:pts.map(p=>p.P),mode:'lines+markers+text',text:pts.map(p=>p.lb),textposition:'top center',textfont:{size:12,color:VW_COLORS[ci%VW_COLORS.length],family:'var(--font)'},marker:{size:12,line:{width:1,color:'#fff'}},line:{color:VW_COLORS[ci%VW_COLORS.length],width:Math.max(lw,2.5)},name:cs.label||cs.name,hovertemplate:'h=%{x:.1f} kJ/kg<br>P=%{y:.2f} bar<extra></extra>'})}
    });
    // 축 범위
    let hRange,pRange;
    if(cycleH.length>0){
      const hPad=Math.max((Math.max(...cycleH)-Math.min(...cycleH))*.25,20);
      const pMin=Math.min(...cycleP),pMax=Math.max(...cycleP);
      const calcH=[Math.min(...cycleH)-hPad,Math.max(...cycleH)+hPad];
      const calcP=[Math.log10(Math.max(.3,pMin*.6)),Math.log10(pMax*1.4)];
      if(!fixedRange)setFixedRange({h:calcH,p:calcP});
      if(autoFit){hRange=calcH;pRange=calcP}
      else if(fixedRange){hRange=fixedRange.h;pRange=fixedRange.p}
      else{hRange=calcH;pRange=calcP}
    }else{
      hRange=[Math.min(...s.hl)*.8,Math.max(...s.hv)*1.05];
      pRange=[Math.log10(.5),Math.log10(c.P*1.15)];
    }
    try{Plotly.react(ref.current,tr,{
      title:{text:'<b>P-h 선도</b> — '+satData.coolprop_name+(hasOverlay?' (t='+curT.toFixed(1)+' min)':''),font:{size:14},y:.98,yanchor:'top'},
      xaxis:{title:{text:'<b>엔탈피</b> [kJ/kg]',font:{size:12}},range:hRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,tickfont:{size:11}},
      yaxis:{title:{text:'<b>압력</b> [bar abs]',font:{size:12}},type:'log',range:pRange,gridcolor:'rgba(0,0,0,0.08)',linecolor:'rgba(0,0,0,0.2)',linewidth:1,mirror:true,zeroline:false,dtick:.30103,tickfont:{size:11}},
      height:chartH,width:fW,margin:{t:60,b:60,l:80,r:30},
      paper_bgcolor:'rgba(255,255,255,0)',plot_bgcolor:'#ffffff',
      font:{family:'var(--font)',color:'#3a3a4e',size:11},
      legend:{orientation:'h',y:-.15,x:.5,xanchor:'center',font:{size:11},bgcolor:'rgba(255,255,255,0.8)'},
      hovermode:'closest',dragmode:dragMode==='pan'?'pan':'zoom'
    },{responsive:!fW,displaylogo:false,scrollZoom:true})}catch(e){console.error('VwPh:',e)}
  },[satData,cases,caseVis,timeIdx,lw,chartH,chartW,dragMode,curT,autoFit]);

  const stPts=useMemo(()=>cases.map((cs,ci)=>{if(!caseVis[cs.name])return null;const i=timeIdx[ci];const d=cs.data;if(!d?.h_Comp_In_ref?.[i]||!d?.P_Comp_In?.[i])return null;const BA=1.01325;
    const pts=[];
    pts.push({lb:'①압축기입구',P:d.P_Comp_In[i]+BA,h:d.h_Comp_In_ref[i],T:d.T_Comp_In?.[i]});
    if(d.h_Comp_Out_ref?.[i]!=null)pts.push({lb:'②압축기출구',P:(d.P_Comp_Out?.[i]||0)+BA,h:d.h_Comp_Out_ref[i],T:d.T_Comp_Out?.[i]});
    if(d.h_Cond_Out_ref?.[i]!=null)pts.push({lb:'③응축기출구',P:(d.P_Comp_Out?.[i]||0)+BA,h:d.h_Cond_Out_ref[i],T:d.T_Cond_Out?.[i]});
    if(d.h_Eva_In_ref?.[i]!=null)pts.push({lb:'④팽창밸브출구',P:d.P_Comp_In[i]+BA,h:d.h_Eva_In_ref[i],T:d.T_Eva_Out?.[i]});
    return pts.length?{name:cs.label||cs.name,color:VW_COLORS[ci%VW_COLORS.length],pts}:null;
  }).filter(Boolean),[cases,caseVis,timeIdx]);

  return(<div>
    {!hasRefData&&<div style={{padding:12,margin:'0 0 10px',background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:8,fontSize:12,color:'var(--amber)'}}>
      ⚠️ P-h 선도: T_Comp_In + P_Comp_In이 있으면 서버에서 엔탈피를 자동 계산합니다. 현재 데이터에 압력/온도 컬럼이 없습니다.
    </div>}
    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
      <span className="it">냉매:</span>
      <select value={refName} onChange={e=>setRefName(e.target.value)} style={{width:130}}>
        <option value="R290">R290 (Propane)</option><option value="R134a">R134a</option>
        <option value="R32">R32</option><option value="R410A">R410A</option>
        <option value="R1234yf">R1234yf</option>
      </select>
      {satData&&<span className="it">Tc={satData.critical.T.toFixed(1)}°C / Pc={satData.critical.P.toFixed(1)}bar</span>}
      {satErr&&<span style={{fontSize:11,color:'var(--red)'}}>{satErr}</span>}
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <span className="it">시점:</span><input type="range" min="0" max="1" step=".005" value={timeR} onChange={e=>setTimeR(+e.target.value)} style={{flex:1,maxWidth:300}}/>
      <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--teal)',padding:'3px 8px',background:'var(--bg)',border:'1px solid var(--bd2)',borderRadius:5}}>{curT.toFixed(1)} min</span>
      <span style={{width:1,height:16,background:'var(--bd2)'}}/>
      <button className={`bt bs ${autoFit?'on':''}`} onClick={()=>setAutoFit(!autoFit)} style={autoFit?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff',fontSize:10}:{fontSize:10}}>{autoFit?'📐 Auto Fit':'📌 고정'}</button>
      {!autoFit&&<button className="bt bs" onClick={()=>{setFixedRange(null);setAutoFit(true)}} style={{fontSize:10}}>↺ 리셋</button>}
    </div>
    <div className="cd" style={{overflowX:'auto',padding:4}}>{satData?<div ref={ref}/>:<div className="it" style={{padding:30,textAlign:'center'}}>{satErr||'포화선 데이터 로딩 중...'}</div>}</div>
    {stPts.length>0&&<div className="cd" style={{marginTop:10}}>
      <div className="ct">냉매 상태점 — {refName} @ t={curT.toFixed(1)} min</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10}}>
      {stPts.map(sp=><div key={sp.name} style={{background:'var(--bg3,#1a1a25)',border:'1px solid var(--bd2)',borderRadius:8,padding:10}}>
        <div style={{fontSize:12,fontWeight:500,marginBottom:6,display:'flex',alignItems:'center',gap:5}}><span style={{width:8,height:8,borderRadius:'50%',background:sp.color}}/>{sp.name}</div>
        {sp.pts.map(p=><div key={p.lb} style={{marginBottom:4}}>
          <div style={{fontSize:11,color:'var(--teal)',marginBottom:2}}>{p.lb}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:2,fontSize:11}}>
            <span>P: <b>{p.P.toFixed(2)} bar</b></span><span>h: <b>{p.h?.toFixed(1)} kJ/kg</b></span>
            {p.T!=null&&<span>T: <b>{p.T.toFixed(1)} °C</b></span>}
          </div>
        </div>)}
      </div>)}
      </div>
    </div>}
  </div>)
}

// ═══ 설정 필드 컴포넌트 (바깥 정의 — 리렌더 시 포커스 유지) ═══
function CfgField({lb,p,t='text',o,u,st,cfg,onChange}){
  const k=p.split('.');let v=cfg;for(const x of k)v=v?.[x];
  return(<div className="fr"><div className="fl">{lb}</div><div className="fi">{o?<select value={v||''} onChange={e=>onChange(p,e.target.value)}>{o.map(x=><option key={x}>{x}</option>)}</select>:<input type={t} value={v??''} step={st} onChange={e=>onChange(p,t==='number'?Number(e.target.value):e.target.value)}/>}</div>{u&&<span className="fu">{u}</span>}</div>)
}

function RefrigerantField({cfg,onChange}){
  const cur=cfg?.environment?.refrigerant||'R290';
  const presets=['R290','R134a'];
  const isPreset=presets.includes(cur);
  const[mode,setMode]=useState(isPreset?'preset':'custom');
  const[custom,setCustom]=useState(isPreset?'':cur);
  const[vResult,setVResult]=useState(null);
  const[checking,setChecking]=useState(false);

  const selectPreset=v=>{onChange('environment.refrigerant',v);setMode('preset');setCustom('');setVResult(null)};
  const clickCustom=()=>{setMode('custom');setVResult(null)};
  const applyCustom=async()=>{
    if(!custom.trim())return;
    setChecking(true);setVResult(null);
    try{
      const be=cfg?.environment?.backend||'HEOS';
      const r=await fetch(`${API}/api/validate-refrigerant/${encodeURIComponent(custom.trim())}?backend=${be}`);
      const txt=await r.text();
      let d;
      try{d=JSON.parse(txt)}catch{d={valid:false,input:custom.trim(),error:txt}}
      setVResult(d);
      if(d.valid){onChange('environment.refrigerant',custom.trim())}
      else{alert(`냉매 "${custom.trim()}" 를 찾을 수 없습니다.\n\nCoolProp 오류: ${d.error}\n\n올바른 냉매명을 입력하세요. (예: R32, R410A, R1234yf)`)}
    }catch(e){alert('검증 실패: '+e.message)}
    setChecking(false);
  };

  return(<div className="fr" style={{alignItems:'flex-start'}}>
    <div className="fl" style={{paddingTop:8}}>냉매</div>
    <div className="fi" style={{display:'flex',flexDirection:'column',gap:6}}>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {presets.map(p=><button key={p} className={`bt bs ${mode==='preset'&&cur===p?'bp':''}`} onClick={()=>selectPreset(p)} style={{minWidth:60}}>{p}</button>)}
        <button className={`bt bs ${mode==='custom'?'bp':''}`} onClick={clickCustom}>직접 입력</button>
      </div>
      {mode==='custom'&&<div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input value={custom} onChange={e=>{setCustom(e.target.value);setVResult(null)}} placeholder="냉매명 입력 (예: R32, R410A)" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&applyCustom()}/>
        <button className="bt bs bp" onClick={applyCustom} disabled={checking}>{checking?'검증 중...':'적용'}</button>
      </div>}
      {vResult&&vResult.valid&&<div style={{fontSize:11,color:'var(--green,#16a34a)',display:'flex',gap:8}}>
        <span>✓ {vResult.input}{vResult.input!==vResult.coolprop_name?` → ${vResult.coolprop_name}`:''}</span>
        <span style={{color:'var(--tx2,#9a9890)'}}>Tc={vResult.Tc}°C, Pc={vResult.Pc}bar</span>
      </div>}
    </div>
  </div>)
}

// ═══ 설정 탭 ═══
function CfgTab({cfg,setCfg}){const[l,sL]=useState(JSON.parse(JSON.stringify(cfg)));const[sv,sSv]=useState(false);
const s=useCallback((p,v)=>{sL(prev=>{const n=JSON.parse(JSON.stringify(prev));const k=p.split('.');let t=n;for(let i=0;i<k.length-1;i++)t=t[k[i]];t[k[k.length-1]]=v;return n})},[]);
const save=async()=>{sSv(true);try{await fetch(`${API}/api/config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(l)});setCfg(JSON.parse(JSON.stringify(l)));alert('저장 완료')}catch(e){alert(e.message)}sSv(false)};
const fp={cfg:l,onChange:s};
return(<div><div className="fg"><div>
<div className="cd"><div className="ct">실험 환경</div>
<RefrigerantField cfg={l} onChange={s}/>
<CfgField lb="대기압" p="environment.patm" t="number" st="0.001" u="kPa" {...fp}/><CfgField lb="백엔드" p="environment.backend" o={['HEOS','REFPROP']} {...fp}/></div>
<div className="cd"><div className="ct">처리 모드</div>
<div className="fr"><div className="fl">사용 소스</div><div className="fi" style={{display:'flex',gap:12}}>
{['BR','AMS','MX100'].map(src=>{const ds=l?.processing?.data_sources||[];const on=ds.includes(src);return<label key={src} style={{display:'flex',alignItems:'center',gap:4,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={on} onChange={()=>{const cur=l?.processing?.data_sources||[];s('processing.data_sources',on?cur.filter(x=>x!==src):[...cur,src])}} style={{accentColor:'var(--teal)',width:15,height:15}}/>{src}</label>})}
</div></div>
<CfgField lb="기준 시간축" p="processing.data_time" o={['BR','AMS','MX100']} {...fp}/><CfgField lb="필터 모드" p="processing.filter_mode" o={['Dry_Only','Wash_and_Dry']} {...fp}/><CfgField lb="리샘플링" p="processing.time_interval" t="number" u="초" {...fp}/></div>
</div><div>
<div className="cd"><div className="ct">후처리 필터</div><CfgField lb="LPF τ" p="filtering.lpf_tau" t="number" st="0.1" {...fp}/><CfgField lb="노이즈 윈도우" p="filtering.noise_window" t="number" {...fp}/><CfgField lb="노이즈 임계값" p="filtering.noise_threshold" t="number" st="0.1" {...fp}/><CfgField lb="최소 Hz" p="filtering.min_hz" t="number" u="Hz" {...fp}/><CfgField lb="종료 탐색" p="filtering.last_min" t="number" st="0.5" u="분" {...fp}/></div>
<div className="cd"><div className="ct">RH 수렴 계산</div><CfgField lb="증발기 출구 RH" p="calculation.rh_eva_out_assumed" t="number" st="0.01" {...fp}/><CfgField lb="최대 반복" p="calculation.rh_iteration.max_iter" t="number" {...fp}/><CfgField lb="수렴 임계값" p="calculation.rh_iteration.tolerance" t="number" st="0.001" {...fp}/><CfgField lb="감쇠 계수" p="calculation.rh_iteration.damping" t="number" st="0.05" {...fp}/></div>
<div className="cd"><div className="ct">센서 보정 [°C]</div><CfgField lb="T_Cond_In" p="calculation.sensor_offsets.T_Cond_In" t="number" st="0.1" {...fp}/><CfgField lb="T_Cond_Out" p="calculation.sensor_offsets.T_Cond_Out" t="number" st="0.1" {...fp}/><CfgField lb="T_Cond_M1" p="calculation.sensor_offsets.T_Cond_M1" t="number" st="0.1" {...fp}/><CfgField lb="T_Air_Eva_Out" p="calculation.sensor_offsets.T_Air_Eva_Out" t="number" st="0.1" {...fp}/><CfgField lb="T_Comp_In" p="calculation.sensor_offsets.T_Comp_In" t="number" st="0.1" {...fp}/><CfgField lb="T_Comp_Out" p="calculation.sensor_offsets.T_Comp_Out" t="number" st="0.1" {...fp}/></div>
</div></div><div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:4}}><button className="bt" onClick={()=>sL(JSON.parse(JSON.stringify(cfg)))}>초기화</button><button className="bt bp" onClick={save} disabled={sv}>{sv?'저장 중...':'설정 저장'}</button></div></div>)}

// ═══ 미리보기 탭 ═══
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
