<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dryer Merger v5</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2/plotly.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f5f7;--bg2:#ffffff;--bg3:#eeeef0;--bg4:#e4e4e8;--tx:#1a1a2e;--tx2:#5a5a6e;--tx3:#9a9aaa;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--blue:#2563eb;--blue2:#1d4ed8;--green:#16a34a;--green2:#15803d;--red:#dc2626;--amber:#d97706;--teal:#0d9488;--font:'IBM Plex Sans KR',sans-serif;--mono:'JetBrains Mono',monospace;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--tx3);border-radius:3px}::-webkit-scrollbar-track{background:var(--bg3)}
.app{max-width:1200px;margin:0 auto;padding:20px}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:24px}.hdr h1{font-size:20px;font-weight:500}.hdr .bdg{font-size:11px;background:var(--bg3);color:var(--tx2);padding:3px 10px;border-radius:20px}
.tabs{display:flex;gap:2px;background:var(--bg3);padding:3px;border-radius:var(--r);margin-bottom:20px}.tb{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;border:none;background:0;color:var(--tx2);cursor:pointer;border-radius:8px;transition:.15s;font-family:var(--font)}.tb.on{background:var(--bg2);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cd{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.ct{font-size:12px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.bt{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);cursor:pointer;transition:.15s;font-family:var(--font)}.bt:hover{background:var(--bg4)}.bt:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--blue2);border-color:var(--blue2);color:#fff}.bp:hover{background:var(--blue)}
.bg{background:var(--green2);border-color:var(--green2);color:#fff}.bg:hover{background:var(--green)}
.bs{padding:5px 12px;font-size:12px}
input,select{font-family:var(--font);font-size:13px;padding:7px 12px;background:var(--bg);border:1px solid var(--bd2);border-radius:8px;color:var(--tx);outline:0}input:focus,select:focus{border-color:var(--blue)}
.pi{flex:1;font-family:var(--mono)}.pr{display:flex;gap:8px;margin-bottom:12px}
.cl{border:1px solid var(--bd);border-radius:8px;max-height:200px;overflow-y:auto}.ci{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);cursor:pointer;font-size:13px;transition:.1s}.ci:last-child{border:0}.ci:hover{background:rgba(255,255,255,.02)}.ci.on{background:rgba(74,158,255,.08)}.ci input{accent-color:var(--blue)}
.ft{font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono)}.fb{background:rgba(34,197,94,.08);color:var(--green);border:1px solid rgba(34,197,94,.15)}.fa{background:rgba(74,158,255,.08);color:var(--blue);border:1px solid rgba(74,158,255,.15)}.fm{background:rgba(245,158,11,.08);color:var(--amber);border:1px solid rgba(245,158,11,.15)}
.pb{width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin:8px 0}.pf{height:100%;background:linear-gradient(90deg,var(--green2),var(--teal));border-radius:4px;transition:width .3s}
.lv{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px;font-family:var(--mono);font-size:12px;line-height:1.8;max-height:260px;overflow-y:auto}.ll{white-space:pre-wrap;word-break:break-all}.li{color:var(--blue)}.lo{color:var(--green)}.lw{color:var(--amber)}.le{color:var(--red)}.ld{color:var(--tx3)}
.sb{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.rr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)}.rr:last-child{border:0}.rn{font-family:var(--mono);font-size:13px}.rt{font-size:10px;padding:2px 8px;border-radius:10px;font-family:var(--mono)}
.rt-m{background:rgba(74,158,255,.1);color:var(--blue)}.rt-c{background:rgba(34,197,94,.1);color:var(--green)}
.it{font-size:12px;color:var(--tx2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:768px){.fg{grid-template-columns:1fr}}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:10px}.fl{width:120px;font-size:12px;color:var(--tx2);text-align:right;flex-shrink:0}.fi{flex:1}.fi input,.fi select{width:100%}.fu{font-size:11px;color:var(--tx3);min-width:30px}
.tw{border:1px solid var(--bd);border-radius:8px;overflow:auto;max-height:320px}table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}th{background:var(--bg3);padding:8px 10px;text-align:right;font-weight:500;color:var(--tx2);position:sticky;top:0;z-index:1;white-space:nowrap}th:first-child,td:first-child{text-align:left}td{padding:6px 10px;text-align:right;border-top:1px solid var(--bd);white-space:nowrap}
.cw{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px;height:300px;position:relative}.cc{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.cc label{font-size:12px;color:var(--tx2)}.cc select{padding:5px 8px;font-size:12px}
.file-sel{border:1px solid var(--bd);border-radius:8px;max-height:150px;overflow-y:auto;margin-bottom:12px}
.file-sel-item{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--bd);font-size:12px;font-family:var(--mono)}
.file-sel-item:last-child{border:0}
.file-sel-item input{accent-color:var(--teal)}
select{background:var(--bg2);color:var(--tx);border:1px solid var(--bd2);border-radius:4px}
select option{background:#fff;color:#1a1a2e}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;const API='';

function App(){const[tab,setTab]=useState('merge');const[cfg,setCfg]=useState(null);const[sid,setSid]=useState(null);const[mergeSt,setMergeSt]=useState(null);const[calcSt,setCalcSt]=useState(null);const[viewerAutoLoad,setViewerAutoLoad]=useState(null);const[calcAutoFiles,setCalcAutoFiles]=useState(null);
useEffect(()=>{fetch(`${API}/api/config`).then(r=>r.json()).then(setCfg)},[]);
const[updating,setUpdating]=useState(false);
const[verDate,setVerDate]=useState('');
useEffect(()=>{fetch(`${API}/api/version`).then(r=>r.json()).then(d=>setVerDate(d.date||'')).catch(()=>{})},[]);
const doUpdate=async()=>{if(!confirm('GitHub에서 최신 버전을 받고 서버를 재시작합니다.\n계속하시겠습니까?'))return;
  setUpdating(true);try{const r=await fetch(`${API}/api/update`,{method:'POST'});const d=await r.json();
    if(d.status==='updated'){alert(`✅ ${d.files}개 파일 업데이트.\n서버 재시작 중... 자동 새로고침됩니다.`);
      const tryReload=()=>{fetch(`${API}/api/version`).then(()=>location.reload()).catch(()=>setTimeout(tryReload,2000))};
      setTimeout(tryReload,3000)}
    else{alert('❌ 업데이트 실패: '+d.message);setUpdating(false)}
  }catch(e){alert('❌ 연결 실패');setUpdating(false)}};
return(<div className="app"><div className="hdr" style={{display:'flex',alignItems:'center',gap:10}}>
  <h1>Dryer Merger</h1>
  <span className="bdg">{verDate||'...'}</span>
  <button onClick={doUpdate} disabled={updating} style={{fontSize:10,padding:'3px 10px',background:updating?'var(--bg3)':'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.25)',color:updating?'var(--tx3)':'#2563eb',borderRadius:5,cursor:updating?'wait':'pointer'}}>{updating?'⏳ 업데이트 중...':'🔄 업데이트'}</button>
</div>
<div className="tabs">
  <button className={`tb ${tab==='merge'?'on':''}`} onClick={()=>setTab('merge')}>Merge</button>
  <button className={`tb ${tab==='calc'?'on':''}`} onClick={()=>setTab('calc')}>Calculation</button>
  <button className={`tb ${tab==='formula'?'on':''}`} onClick={()=>setTab('formula')}>Formula</button>
  <button className={`tb ${tab==='viewer'?'on':''}`} onClick={()=>setTab('viewer')}>Viewer</button>
  <button className={`tb ${tab==='config'?'on':''}`} onClick={()=>setTab('config')}>설정</button>
</div>
<div style={{display:tab==='merge'?'block':'none'}}>{cfg&&<MergeTab cfg={cfg} sid={sid} setSid={setSid} st={mergeSt} setSt={setMergeSt} setTab={setTab} setCalcAutoFiles={setCalcAutoFiles}/>}</div>
<div style={{display:tab==='calc'?'block':'none'}}>{cfg&&<CalcTab cfg={cfg} sid={sid} setSid={setSid} st={calcSt} setSt={setCalcSt} setTab={setTab} setViewerAutoLoad={setViewerAutoLoad} calcAutoFiles={calcAutoFiles} clearCalcAutoFiles={()=>setCalcAutoFiles(null)}/>}</div>
<div style={{display:tab==='formula'?'block':'none'}}><FormulaTab/></div>
<div style={{display:tab==='viewer'?'block':'none'}}><ViewerTab cfg={cfg} autoLoad={viewerAutoLoad} clearAutoLoad={()=>setViewerAutoLoad(null)}/></div>
<div style={{display:tab==='config'?'block':'none'}}>{cfg&&<CfgTab cfg={cfg} setCfg={setCfg}/>}</div>
</div>)}

// ═══ 공통: 경로 탐색 + 케이스 선택 ═══
function PathSelector({sid,setSid,setSt,onSessionReady}){
const[path,setPath]=useState(localStorage.getItem('dryer_path')||'D:\\');
const[cases,setCases]=useState([]);const[cf,setCf]=useState({});const[sel,setSel]=useState(new Set());const[busy,setBusy]=useState(false);
const browse=async()=>{setBusy(true);try{const r=await fetch(`${API}/api/browse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});const d=await r.json();if(!r.ok){alert(d.detail);setBusy(false);return}setCases(d.cases||[]);setPath(d.path);localStorage.setItem('dryer_path',d.path);setSel(new Set(d.cases||[]))}catch(e){alert(e.message)}setBusy(false)};
const confirm=async()=>{if(!sel.size){alert('선택 없음');return}try{const r=await fetch(`${API}/api/select`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category_path:path,case_names:[...sel]})});const d=await r.json();if(!r.ok){alert(d.detail);return}setSid(d.session_id);setCf(d.cases||{});setSt({status:'ready',progress:0,log:[],merge_results:[],calc_results:[]});if(onSessionReady)onSessionReady(d.session_id,d.cases)}catch(e){alert(e.message)}};
const tog=n=>{setSel(p=>{const s=new Set(p);s.has(n)?s.delete(n):s.add(n);return s})};
return(<div className="cd"><div className="ct">데이터 경로</div>
<div className="pr"><input className="pi" value={path} onChange={e=>setPath(e.target.value)} placeholder="D:\실험데이터" onKeyDown={e=>e.key==='Enter'&&browse()}/><button className="bt bp" onClick={browse} disabled={busy}>{busy?'탐색 중...':'경로 탐색'}</button></div>
{cases.length>0&&<><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><span className="it">{cases.length}개 케이스 — {sel.size}개 선택</span><div style={{display:'flex',gap:6}}><button className="bt bs" onClick={()=>setSel(new Set(cases))}>전체</button><button className="bt bs" onClick={()=>setSel(new Set())}>해제</button></div></div>
<div className="cl">{cases.map(c=><div key={c} className={`ci ${sel.has(c)?'on':''}`} onClick={()=>tog(c)}><input type="checkbox" checked={sel.has(c)} readOnly/><span>{c}</span></div>)}</div>
<div style={{marginTop:12,display:'flex',gap:8,alignItems:'center'}}>
  <button className="bt bg" onClick={confirm}>케이스 확정 ({sel.size}개)</button>
  {sid&&<span className="it">세션: {sid}</span>}
</div>

{/* 파일 분류 요약 */}
{Object.keys(cf).length>0&&<div style={{marginTop:12}}>{Object.entries(cf).map(([c,f])=><div key={c} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',fontSize:12}}><span style={{color:'var(--tx2)',minWidth:200}}>{c}</span><div style={{display:'flex',gap:4}}>{f.br?.length>0&&<span className="ft fb">BR×{f.br.length}</span>}{f.ams?.length>0&&<span className="ft fa">AMS×{f.ams.length}</span>}{f.mx100?.length>0&&<span className="ft fm">MX×{f.mx100.length}</span>}</div></div>)}</div>}
</>}
</div>)}

// ═══ 세이브 슬롯 공용 컴포넌트 ═══
function SaveSlots({category,getData,onLoad,label}){
  const[slots,setSlots]=useState([]);
  const[newName,setNewName]=useState('');
  const[open,setOpen]=useState(false);
  const fileRef=useRef(null);
  const reload=()=>fetch(`${API}/api/saves/${category}`).then(r=>r.json()).then(d=>setSlots(d.slots||[])).catch(()=>{});
  useEffect(()=>{reload()},[]);
  const save=async()=>{if(!newName.trim())return;
    const data=getData();
    try{await fetch(`${API}/api/saves/${category}/${encodeURIComponent(newName.trim())}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      setNewName('');reload();
    }catch(e){alert('저장 실패')}};
  const load=async(name)=>{
    try{const r=await fetch(`${API}/api/saves/${category}/${encodeURIComponent(name)}`);const d=await r.json();onLoad(d);
    }catch(e){alert('불러오기 실패')}};
  const del=async(name)=>{if(!confirm(`"${name}" 슬롯을 삭제하시겠습니까?`))return;
    try{await fetch(`${API}/api/saves/${category}/${encodeURIComponent(name)}`,{method:'DELETE'});reload();
    }catch(e){alert('삭제 실패')}};
  // JSON 내보내기
  const exportJson=()=>{const data=getData();data.category=category;data.timestamp=new Date().toISOString();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${category}_settings.json`;a.click()};
  // JSON 가져오기
  const importJson=e=>{const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);onLoad(d);alert('JSON 불러오기 완료')}catch(er){alert('JSON 파싱 실패')}};rd.readAsText(f);e.target.value=''};
  return(<div style={{display:'inline-block',position:'relative'}}>
    <button className="bt bs" onClick={()=>{setOpen(!open);if(!open)reload()}} style={{borderColor:'var(--teal)',color:'var(--teal)'}}>💾 {label||'세이브'}</button>
    {open&&<div style={{position:'absolute',right:0,top:'100%',marginTop:4,zIndex:999,width:340,background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:10,boxShadow:'0 8px 32px rgba(0,0,0,.15)',padding:12}}>
      <div style={{fontSize:12,fontWeight:500,marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span>세이브 슬롯</span>
        <button onClick={()=>setOpen(false)} style={{border:0,background:0,color:'var(--tx2)',cursor:'pointer',fontSize:14}}>×</button>
      </div>
      {/* 새 저장 */}
      <div style={{display:'flex',gap:4,marginBottom:6}}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&save()} placeholder="새 세이브 이름" style={{flex:1,fontSize:11,padding:'4px 8px',background:'var(--bg2)',border:'1px solid var(--bd2)',borderRadius:4,color:'var(--tx)',fontFamily:'var(--font)'}}/>
        <button className="bt bs" onClick={save} disabled={!newName.trim()} style={{fontSize:10,padding:'4px 10px',background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}}>저장</button>
      </div>
      {/* JSON 내보내기/가져오기 */}
      <div style={{display:'flex',gap:4,marginBottom:8}}>
        <button className="bt bs" onClick={exportJson} style={{fontSize:10,flex:1}}>📤 JSON 내보내기</button>
        <button className="bt bs" onClick={()=>fileRef.current?.click()} style={{fontSize:10,flex:1}}>📥 JSON 가져오기</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={importJson}/>
      </div>
      {/* 슬롯 목록 */}
      <div style={{maxHeight:200,overflowY:'auto'}}>
        {slots.length===0&&<div className="it" style={{textAlign:'center',padding:8}}>저장된 슬롯 없음</div>}
        {slots.map(s=><div key={s.name} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 4px',borderBottom:'1px solid var(--bd)',fontSize:11}}>
          <span style={{flex:1,fontFamily:'var(--mono)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={s.name}>{s.name}</span>
          <span className="it" style={{fontSize:9,whiteSpace:'nowrap'}}>{s.timestamp?new Date(s.timestamp).toLocaleDateString():''}</span>
          <button onClick={()=>{load(s.name);setOpen(false)}} style={{fontSize:9,padding:'2px 8px',background:'var(--teal)',border:'1px solid var(--teal)',color:'#fff',borderRadius:3,cursor:'pointer'}}>불러오기</button>
          <button onClick={()=>del(s.name)} style={{fontSize:9,padding:'2px 5px',border:'1px solid rgba(239,68,68,.3)',background:0,color:'var(--red)',borderRadius:3,cursor:'pointer'}}>×</button>
        </div>)}
      </div>
    </div>}
  </div>)
}

// ═══ 로컬 파일 불러오기 ═══
function LocalImport({onImported,addSuffix=true,filterMergedCalc=false}){
const[open,setOpen]=useState(false);
const[path,setPath]=useState(localStorage.getItem('dryer_calc_path')||'');
const[cases,setCases]=useState([]);        // 케이스 폴더 목록
const[selCases,setSelCases]=useState(new Set());  // 선택된 케이스
const[caseFiles,setCaseFiles]=useState({}); // {case: [{name,path,size,has_merged}]}
const[selFiles,setSelFiles]=useState(new Set()); // 선택된 파일 경로
const[busy,setBusy]=useState(false);

// 1단계: 상위 폴더 탐색 → 케이스 목록
const browse=async()=>{if(!path.trim())return;setBusy(true);
  try{const r=await fetch(`${API}/api/browse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:path.trim()})});
  const d=await r.json();if(!r.ok){alert(d.detail);setBusy(false);return}
  setCases(d.cases||[]);setPath(d.path);localStorage.setItem('dryer_calc_path',d.path);
  setSelCases(new Set(d.cases||[]));setCaseFiles({});setSelFiles(new Set());
  }catch(e){alert(e.message)}setBusy(false)};

const togCase=n=>{setSelCases(p=>{const s=new Set(p);s.has(n)?s.delete(n):s.add(n);return s})};

// 2단계: 선택된 케이스에서 CSV 스캔
const scanCsvs=async()=>{if(!selCases.size)return;setBusy(true);
  try{const r=await fetch(`${API}/api/scan-case-csvs`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category_path:path,case_names:[...selCases]})});
  const d=await r.json();if(!r.ok){alert(d.detail);setBusy(false);return}
  setCaseFiles(d.cases||{});
  // merged 파일 자동 선택
  const auto=new Set();Object.values(d.cases||{}).forEach(arr=>arr.forEach(f=>{if(f.has_merged||f.has_calc)auto.add(f.path)}));
  setSelFiles(auto);
  }catch(e){alert(e.message)}setBusy(false)};

const togFile=p=>{setSelFiles(prev=>{const s=new Set(prev);s.has(p)?s.delete(p):s.add(p);return s})};
const allFiles=Object.values(caseFiles).flat().filter(f=>!filterMergedCalc||(f.has_merged||f.has_calc));

// 3단계: 가져오기
const doImport=async()=>{if(!selFiles.size)return;setBusy(true);
  try{const r=await fetch(`${API}/api/import-merged`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_paths:[...selFiles],add_merged_suffix:addSuffix})});
  const d=await r.json();
  if(d.count>0){alert(`${d.count}개 파일을 가져왔습니다.`);if(onImported)onImported();setOpen(false)}
  if(d.errors?.length)alert('오류:\n'+d.errors.join('\n'));
  }catch(e){alert(e.message)}setBusy(false)};

return(<div>
  <button className="bt bs" onClick={()=>setOpen(p=>!p)} style={{marginBottom:open?8:0}}>{open?'▲ 닫기':'📂 로컬 파일 불러오기'}</button>
  {open&&<div style={{padding:12,background:'var(--bg,#fafaf8)',border:'1px solid var(--bd,#e4e2dc)',borderRadius:8}}>
    {/* 경로 입력 */}
    <div style={{display:'flex',gap:6,marginBottom:10}}>
      <input value={path} onChange={e=>setPath(e.target.value)} placeholder="상위 폴더 경로 (예: D:\실험데이터\20260318)" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&browse()}/>
      <button className="bt bs bp" onClick={browse} disabled={busy}>경로 탐색</button>
    </div>

    {/* 케이스 선택 */}
    {cases.length>0&&<>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span className="it">{cases.length}개 케이스 — {selCases.size}개 선택</span>
        <div style={{display:'flex',gap:4}}>
          <button className="bt bs" onClick={()=>setSelCases(new Set(cases))}>전체</button>
          <button className="bt bs" onClick={()=>setSelCases(new Set())}>해제</button>
        </div>
      </div>
      <div style={{border:'1px solid var(--bd,#e4e2dc)',borderRadius:6,overflow:'hidden',maxHeight:120,overflowY:'auto',marginBottom:8}}>
        {cases.map(c=><div key={c} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 10px',borderBottom:'1px solid var(--bd,#f0efe8)',cursor:'pointer',opacity:selCases.has(c)?1:.4}} onClick={()=>togCase(c)}>
          <input type="checkbox" checked={selCases.has(c)} readOnly style={{accentColor:'var(--blue,#2563eb)'}}/>
          <span style={{fontSize:13}}>{c}</span>
        </div>)}
      </div>
      <button className="bt bs bp" onClick={scanCsvs} disabled={busy||!selCases.size} style={{marginBottom:8}}>{busy?'스캔 중...':'CSV 파일 스캔 ('+selCases.size+'개 케이스)'}</button>
    </>}

    {/* CSV 파일 목록 */}
    {allFiles.length>0&&<>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <span className="it">{allFiles.length}개 CSV — {selFiles.size}개 선택</span>
        <div style={{display:'flex',gap:4}}>
          <button className="bt bs" onClick={()=>setSelFiles(new Set(allFiles.map(f=>f.path)))}>전체</button>
          <button className="bt bs" onClick={()=>setSelFiles(new Set(allFiles.filter(f=>f.has_merged).map(f=>f.path)))}>merged만</button>
          <button className="bt bs" onClick={()=>setSelFiles(new Set(allFiles.filter(f=>f.has_calc).map(f=>f.path)))}>calc만</button>
          <button className="bt bs" onClick={()=>setSelFiles(new Set())}>해제</button>
        </div>
      </div>
      {Object.entries(caseFiles).map(([caseName,files])=>files.length>0&&<div key={caseName} style={{marginBottom:6}}>
        <div style={{fontSize:11,color:'var(--teal,#0d9488)',fontWeight:500,marginBottom:2,paddingLeft:4}}>{caseName}</div>
        <div className="file-sel">
          {files.map(f=><div key={f.path} className="file-sel-item" style={{opacity:selFiles.has(f.path)?1:.4}}>
            <input type="checkbox" checked={selFiles.has(f.path)} onChange={()=>togFile(f.path)}/>
            <span style={{flex:1}}>{f.name}</span>
            {f.has_calc&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:'rgba(34,197,94,.1)',color:'var(--green,#22c55e)'}}>calc</span>}
            {f.has_merged&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:4,background:'rgba(20,184,166,.1)',color:'var(--teal,#0d9488)'}}>merged</span>}
            <span className="it">{(f.size/1024).toFixed(0)} KB</span>
          </div>)}
        </div>
      </div>)}
      <button className="bt bg bs" onClick={doImport} disabled={busy||!selFiles.size} style={{marginTop:6}}>{busy?'가져오는 중...':`${selFiles.size}개 파일 가져오기`}</button>
    </>}
  </div>}
</div>)}

// ═══ 공통: 진행률 + 로그 + 결과 ═══
function StatusPanel({st,resultKey,onPreview}){
if(!st)return null;
const results=st[resultKey]||[];
const skipped=st.skipped_info||{};
const hasSkipped=Object.keys(skipped).length>0;
return(<>
<div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--tx2)',marginBottom:4}}><span>진행률</span><span>{st.progress}%</span></div>
<div className="pb"><div className="pf" style={{width:st.progress+'%'}}/></div>
{st.log?.length>0&&<div className="lv" style={{marginTop:12}}>{st.log.map((l,i)=><div key={i} className={`ll ${l.includes('에러')||l.includes('Error')?'le':l.includes('경고')?'lw':l.includes('→')||l.includes('완료')?'lo':l.includes('중...')?'li':'ld'}`}>{l}</div>)}</div>}
{hasSkipped&&st.status==='done'&&<div style={{marginTop:12,padding:14,background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.15)',borderRadius:10}}>
  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{fontSize:16}}>⚠️</span><span style={{fontSize:13,fontWeight:500,color:'var(--amber)'}}>일부 계산이 스킵되었습니다</span></div>
  {Object.entries(skipped).map(([fn,blocks])=><div key={fn} style={{marginBottom:8}}>
    <div style={{fontSize:11,color:'var(--tx2)',fontFamily:'var(--mono)',marginBottom:4}}>{fn}</div>
    {Object.entries(blocks).map(([blk,reason])=><div key={blk} style={{display:'flex',alignItems:'center',gap:8,padding:'3px 0',fontSize:11}}>
      <span style={{color:'var(--amber)',minWidth:130}}>{blk}</span>
      <span style={{color:'var(--tx3)'}}>{reason}</span>
    </div>)}
  </div>)}
  <div style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>스킵된 블록의 출력값은 0으로 채워집니다. 변수 매핑을 확인하세요.</div>
</div>}
{results.length>0&&<div style={{marginTop:14}}><div className="ct">결과 파일 ({results.length}개)</div>{results.map(f=><div key={f} className="rr"><div style={{display:'flex',alignItems:'center',gap:8}}><span className="rn">{f}</span><span className={`rt ${f.includes('_merged')?'rt-m':'rt-c'}`}>{f.includes('_merged')?'merged':'calc'}</span></div><div style={{display:'flex',gap:6}}>{onPreview&&<button className="bt bs" onClick={()=>onPreview(f)}>미리보기</button>}<a href={`${API}/api/results/${f}`} download className="bt bs bp" style={{textDecoration:'none'}}>다운로드</a></div></div>)}</div>}
{st.error&&<div style={{marginTop:12,padding:12,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.2)',borderRadius:8,fontSize:12,color:'var(--red)'}}>{st.error}</div>}
</>)}

// ═══ Merge 탭 ═══
function MergeTab({cfg,sid,setSid,st,setSt,setTab,setCalcAutoFiles}){
const[poll,setPoll]=useState(false);const pr=useRef();
const[varCols,setVarCols]=useState(null);  // 스캔된 컬럼 {col: {source,dtype}}
const[varSet,setVarSet]=useState({});       // 변수 설정 {col: {include,weight,bias}}
const[varOpen,setVarOpen]=useState(false);  // 패널 접기/펼치기
const[varFilter,setVarFilter]=useState(''); // 검색 필터
const[scanning,setScanning]=useState(false);

// 변수 스캔
const scanVars=async()=>{if(!sid)return;setScanning(true);
  try{const r=await fetch(`${API}/api/scan-columns`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:sid})});
  const d=await r.json();if(!r.ok){alert(d.detail);setScanning(false);return}
  setVarCols(d.columns);
  const csvCols=Object.keys(d.columns);
  // 기본 설정: 전부 include=false로 시작
  const init={};csvCols.forEach(c=>{init[c]={include:false,weight:1.0,bias:0.0,rename:''}});
  // 기본 merge_settings 로드
  let matchCount=0;
  try{const dr=await fetch(`${API}/api/default-merge-settings`);const ds=await dr.json();
    if(ds.variable_settings){
      const settingsKeys=Object.keys(ds.variable_settings);
      console.log('[scanVars] CSV 컬럼:',csvCols.length,'개 / 설정 파일:',settingsKeys.length,'개');
      console.log('[scanVars] 설정 키:',settingsKeys);
      // 1차: 정확 매칭
      Object.entries(ds.variable_settings).forEach(([col,s])=>{
        if(init[col]){init[col]={...init[col],...s,include:true};matchCount++}
      });
      // 2차: strip 매칭 (CSV 컬럼에 공백이 있을 경우)
      if(matchCount<settingsKeys.length){
        const csvMap=new Map();csvCols.forEach(c=>csvMap.set(c.trim(),c)); // trimmed → original
        Object.entries(ds.variable_settings).forEach(([col,s])=>{
          if(!init[col]||init[col].include)return; // 이미 매칭됐으면 스킵
          const orig=csvMap.get(col.trim());
          if(orig&&init[orig]&&!init[orig].include){init[orig]={...init[orig],...s,include:true,rename:s.rename||''};matchCount++}
        });
      }
      console.log('[scanVars] 매칭:',matchCount,'개');
      // 매칭 0건이면 전부 include로 폴백
      if(matchCount===0){
        console.warn('[scanVars] 매칭 0건 — 전부 include로 설정');
        csvCols.forEach(c=>{init[c].include=true});
      }
    }
  }catch(e){
    console.warn('[scanVars] 설정 로드 실패, 전부 include:',e);
    csvCols.forEach(c=>{init[c].include=true})}
  setVarSet(init);setVarOpen(true);
  if(matchCount>0)console.log('[scanVars] 적용 완료:',matchCount,'개 체크됨');
  }catch(e){alert(e.message)}setScanning(false)};

// 변수 설정 변경
const setVar=(col,key,val)=>setVarSet(p=>({...p,[col]:{...p[col],[key]:val}}));
const selectAll=()=>setVarSet(p=>{const n={...p};Object.keys(n).forEach(k=>n[k]={...n[k],include:true});return n});
const deselectAll=()=>setVarSet(p=>{const n={...p};Object.keys(n).forEach(k=>n[k]={...n[k],include:false});return n});
const loadRef=useRef(null);

// 설정 저장
const saveSettings=()=>{
  const proj={version:1,type:'merge_settings',variable_settings:varSet,timestamp:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(proj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='merge_settings.json';a.click();URL.revokeObjectURL(a.href);
};
// 디폴트로 저장
const saveAsDefault=async()=>{
  const inc=Object.fromEntries(Object.entries(varSet).filter(([,v])=>v.include));
  try{const r=await fetch(`${API}/api/save-default-merge-settings`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({variable_settings:inc})});
    const d=await r.json();alert(`✅ 디폴트 저장 완료: ${d.saved}개 변수`);}catch(e){alert('저장 실패: '+e.message)}
};
// 설정 불러오기
const loadSettings=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{
      const proj=JSON.parse(ev.target.result);
      if(proj.variable_settings){
        setVarSet(prev=>{
          const merged={...prev};
          Object.entries(proj.variable_settings).forEach(([col,s])=>{
            if(merged[col])merged[col]={...merged[col],...s};
            else merged[col]=s;
          });
          return merged;
        });
        const cnt=Object.keys(proj.variable_settings).length;
        alert(`설정 불러오기 완료: ${cnt}개 변수`);
      }else{alert('유효한 설정 파일이 아닙니다')}
    }catch(err){alert('파일 오류: '+err.message)}
  };r.readAsText(f);e.target.value='';
};

// Merge 실행 (variable_settings 포함)
const runMerge=async()=>{if(!sid)return;
  const vs=varCols?varSet:null;
  try{await fetch(`${API}/api/merge`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({session_id:sid,config:cfg,variable_settings:vs})});setPoll(true)}catch(e){alert(e.message)}};

useEffect(()=>{if(!poll||!sid)return;const id=setInterval(async()=>{try{const r=await fetch(`${API}/api/status/${sid}`);const d=await r.json();setSt(d);if(d.status==='done'||d.status==='error')setPoll(false)}catch(e){console.error(e)}},800);pr.current=id;return()=>clearInterval(id)},[poll,sid]);

// 필터링된 변수 목록
const filteredVars=varCols?Object.entries(varCols).filter(([c])=>
  !varFilter||c.toLowerCase().includes(varFilter.toLowerCase())):[];

const includedCount=Object.values(varSet).filter(v=>v.include).length;
const wbCount=Object.values(varSet).filter(v=>v.include&&(v.weight!==1.0||v.bias!==0.0)).length;
const renameCount=Object.entries(varSet).filter(([k,v])=>v.include&&v.rename&&v.rename!==k).length;

return(<div>
  <PathSelector sid={sid} setSid={setSid} setSt={setSt}/>

  {/* 변수 설정 패널 */}
  {sid&&<div className="cd">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>varCols&&setVarOpen(p=>!p)}>
      <div className="ct" style={{margin:0}}>변수 설정 (Weight & Bias)</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {varCols&&<span className="it">{includedCount}/{Object.keys(varCols).length}개 포함{wbCount>0&&` / ${wbCount}개 W&B`}{renameCount>0&&` / ${renameCount}개 이름변경`}</span>}
        <button className="bt bs bp" onClick={e=>{e.stopPropagation();scanVars()}} disabled={scanning}>{scanning?'스캔 중...':varCols?'재스캔':'변수 스캔'}</button>
        {varCols&&<span style={{fontSize:10,color:'var(--tx3)',transition:'.2s',transform:varOpen?'rotate(180deg)':''}}>▼</span>}
      </div>
    </div>

    {varOpen&&varCols&&<div style={{marginTop:14}}>
      {/* 툴바 */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
        <input value={varFilter} onChange={e=>setVarFilter(e.target.value)} placeholder="변수명 검색..." style={{width:200,fontSize:12}}/>
        <button className="bt bs" onClick={selectAll}>전체 선택</button>
        <button className="bt bs" onClick={deselectAll}>전체 해제</button>
        <span className="it">{filteredVars.length}개 표시</span>
        <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <button className="bt bs" onClick={saveAsDefault} style={{borderColor:'var(--teal)',color:'var(--teal)',fontSize:10}}>⭐ 디폴트 저장</button>
          <button className="bt bs" onClick={async()=>{try{const r=await fetch(`${API}/api/default-merge-settings`);const d=await r.json();if(d.variable_settings){setVarSet(prev=>{const m={...prev};Object.entries(d.variable_settings).forEach(([col,s])=>{if(m[col])m[col]={...m[col],...s,include:true}});return m});alert(`디폴트 불러옴: ${Object.keys(d.variable_settings).length}개`)}else alert('저장된 디폴트 없음')}catch(e){alert('불러오기 실패')}}} style={{color:'var(--teal)',fontSize:10}}>⭐ 디폴트 불러오기</button>
          <SaveSlots category="merge" label="세이브 슬롯"
            getData={()=>({type:'merge_settings',variable_settings:varSet})}
            onLoad={d=>{if(d.variable_settings){
              setVarSet(prev=>{const m={...prev};Object.entries(d.variable_settings).forEach(([col,s])=>{if(m[col])m[col]={...m[col],...s};else m[col]=s});return m});
              alert(`불러오기 완료: ${Object.keys(d.variable_settings).length}개 변수`)}}}/>
        </div>
      </div>

      {/* 변수 테이블 */}
      <div style={{border:'1px solid var(--bd)',borderRadius:8,overflow:'hidden'}}>
        {/* 헤더 */}
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 60px 70px 70px 70px',gap:0,padding:'8px 12px',background:'var(--bg3)',fontSize:11,color:'var(--tx2)',fontWeight:500}}>
          <span></span><span>원본 변수명</span><span>변경 이름</span><span>소스</span><span style={{textAlign:'center'}}>Weight</span><span style={{textAlign:'center'}}>Bias</span><span></span>
        </div>
        {/* 항목 (최대 300개 표시) */}
        <div style={{maxHeight:350,overflowY:'auto'}}>
          {filteredVars.slice(0,300).map(([col,info])=>{
            const vs=varSet[col]||{include:true,weight:1.0,bias:0.0,rename:''};
            const isModified=vs.weight!==1.0||vs.bias!==0.0;
            const hasRename=vs.rename&&vs.rename!==col;
            return(<div key={col} style={{display:'grid',gridTemplateColumns:'32px 1fr 1fr 60px 70px 70px 70px',gap:0,padding:'5px 12px',borderTop:'1px solid var(--bd)',alignItems:'center',opacity:vs.include?1:.4,fontSize:12}}>
              <input type="checkbox" checked={vs.include} onChange={e=>setVar(col,'include',e.target.checked)} style={{accentColor:'var(--teal)'}}/>
              <span style={{fontFamily:'var(--mono)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:hasRename?'var(--tx3)':'var(--tx)'}} title={col}>{col}</span>
              <input type="text" value={vs.rename||''} onChange={e=>setVar(col,'rename',e.target.value)} placeholder={col} style={{fontSize:11,padding:'3px 6px',background:hasRename?'rgba(59,130,246,.08)':'var(--bg)',borderColor:hasRename?'rgba(59,130,246,.3)':'var(--bd2)',fontFamily:'var(--mono)'}} disabled={!vs.include}/>
              <span className={`ft ${info.source==='BR'?'fb':info.source==='AMS'?'fa':'fm'}`}>{info.source}</span>
              <input type="number" value={vs.weight} step="0.01" onChange={e=>setVar(col,'weight',+e.target.value)} style={{width:60,fontSize:11,padding:'3px 5px',textAlign:'center',background:isModified?'rgba(20,184,166,.08)':'var(--bg)'}} disabled={!vs.include}/>
              <input type="number" value={vs.bias} step="0.1" onChange={e=>setVar(col,'bias',+e.target.value)} style={{width:60,fontSize:11,padding:'3px 5px',textAlign:'center',background:isModified?'rgba(20,184,166,.08)':'var(--bg)'}} disabled={!vs.include}/>
              <button className="bt bs" style={{padding:'2px 6px',fontSize:10}} onClick={()=>{setVar(col,'weight',1.0);setVar(col,'bias',0.0);setVar(col,'rename','')}} disabled={!isModified&&!hasRename}>리셋</button>
            </div>)})}
        </div>
      </div>
      <div className="it" style={{marginTop:8}}>수식: 출력 = 원본 × Weight + Bias / 변경 이름이 있으면 해당 이름으로 출력됩니다</div>
    </div>}
  </div>}

  {/* Merge 실행 */}
  {sid&&st&&<div className="cd">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div className="ct" style={{margin:0}}>Merge 실행</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span className="sb" style={{background:st.status==='done'?'rgba(34,197,94,.1)':st.status==='processing'?'rgba(74,158,255,.1)':st.status==='error'?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',color:st.status==='done'?'var(--green)':st.status==='processing'?'var(--blue)':st.status==='error'?'var(--red)':'var(--amber)'}}>{st.status}</span>
        <button className="bt bg" onClick={runMerge} disabled={st.status==='processing'}>{st.status==='processing'?'처리 중...':'Merge 실행'}</button>
      </div>
    </div>
    <div className="it" style={{marginBottom:8}}>BR + AMS + MX100 → 시간 동기화 → 전처리 → 필터{varCols?` → W&B (${wbCount}개) → ${includedCount}개 변수`:''} → <strong>_merged.csv</strong></div>
    <StatusPanel st={st} resultKey="merge_results"/>
    {st?.status==='done'&&st?.merge_results?.length>0&&<div style={{marginTop:10}}>
      <button className="bt bg" onClick={()=>{
        setCalcAutoFiles(st.merge_results);
        setTab('calc');
      }} style={{background:'#3b82f6',borderColor:'#3b82f6'}}>🧮 Calculation으로 → ({st.merge_results.length}개 파일)</button>
    </div>}
  </div>}
</div>)}

// ═══ Calc 탭 ═══
function CalcTab({cfg,sid,setSid,st,setSt,setTab,setViewerAutoLoad,calcAutoFiles,clearCalcAutoFiles}){
const[poll,setPoll]=useState(false);const pr=useRef();
const[results,setResults]=useState([]);
const[selFiles,setSelFiles]=useState(new Set());
const[exp,setExp]=useState({load_kg:'',imc_kg:'',fmc_kg:''});
const[calcSid,setCalcSid]=useState(sid);
// 변수 매핑
const[calcVars,setCalcVars]=useState([]);     // 서버에서 받은 CALC_VARIABLES
const[mergedCols,setMergedCols]=useState([]);  // merged CSV 컬럼 목록
const[mapping,setMapping]=useState({});        // {calc_var: merged_col}
const[unmatched,setUnmatched]=useState([]);    // 필수인데 매핑 안 된 것
const[mapOpen,setMapOpen]=useState(false);
const mapLoadRef=useRef(null);

// merged 파일 목록 로드
const loadResults=async()=>{try{const r=await fetch(`${API}/api/results`);const d=await r.json();setResults(d.filter(f=>f.name.includes('_merged')))}catch(e){console.error(e)}};
useEffect(()=>{loadResults()},[]);
useEffect(()=>{if(st?.status==='done')loadResults()},[st?.status]);
// Merge에서 넘어온 파일 자동 선택
useEffect(()=>{if(!calcAutoFiles?.length)return;
  fetch(`${API}/api/results`).then(r=>r.json()).then(d=>{
    const merged=d.filter(f=>f.name.includes('_merged'));
    setResults(merged);
    const toSel=new Set(calcAutoFiles.filter(fn=>merged.some(f=>f.name===fn)));
    if(toSel.size)setSelFiles(toSel);
    if(clearCalcAutoFiles)clearCalcAutoFiles();
  }).catch(()=>{});
},[calcAutoFiles]);
useEffect(()=>{if(st?.merge_results?.length)setSelFiles(new Set(st.merge_results))},[st?.merge_results]);

// CALC_VARIABLES 로드 (1회)
useEffect(()=>{fetch(`${API}/api/calc-variables`).then(r=>r.json()).then(d=>setCalcVars(d.variables||[]))},[]);

// 자동 매핑 (컬럼은 건드리지 않음 — mapping만 설정)
const autoMap=async(fn)=>{
  try{const r=await fetch(`${API}/api/auto-map`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:fn})});
  const d=await r.json();if(!r.ok){console.warn('auto-map 실패:',d.detail);return}
  setMapping(d.mapping||{});setUnmatched(d.unmatched_required||[]);setMapOpen(true);
  }catch(e){console.warn('auto-map 오류:',e.message)}};

// 파일 선택 변경 시 컬럼 로드 → 자동 매핑 (순차)
const firstSel=[...selFiles][0];
useEffect(()=>{
  if(!firstSel)return;
  // 1. 컬럼 로드 (항상 실행)
  fetch(`${API}/api/columns/${firstSel}`).then(r=>r.json()).then(d=>{
    const cols=d.columns||[];
    setMergedCols(cols);
    // 2. 컬럼 로드 성공 후 자동 매핑 시도
    if(cols.length&&calcVars.length)autoMap(firstSel);
  }).catch(e=>console.error('columns 로드 실패:',e));
},[firstSel,calcVars]);

const setMap=(calcVar,mergedCol)=>setMapping(p=>{
  const n={...p,[calcVar]:mergedCol||null};
  // unmatched 재계산
  const um=calcVars.filter(v=>v.required&&!n[v.key]).map(v=>v.key);
  setUnmatched(um);return n});

const togFile=n=>{setSelFiles(p=>{const s=new Set(p);s.has(n)?s.delete(n):s.add(n);return s})};

// 매핑 설정 저장/불러오기
const saveMapping=()=>{
  const proj={version:1,type:'calc_mapping',mapping,timestamp:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(proj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='calc_mapping.json';a.click();URL.revokeObjectURL(a.href);
};
const saveMappingDefault=async()=>{
  try{const r=await fetch(`${API}/api/save-default-calc-mapping`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mapping})});
    const d=await r.json();alert(`✅ 디폴트 저장 완료: ${d.saved}개 매핑`);}catch(e){alert('저장 실패: '+e.message)}
};
const loadMappingDefault=async()=>{
  try{const r=await fetch(`${API}/api/default-calc-mapping`);const d=await r.json();
    if(d.mapping&&Object.keys(d.mapping).length){setMapping(d.mapping);
      const um=calcVars.filter(v=>v.required&&!d.mapping[v.key]).map(v=>v.key);setUnmatched(um);
      alert(`디폴트 매핑 불러옴: ${Object.values(d.mapping).filter(Boolean).length}개 연결`);
    }else alert('저장된 디폴트 매핑 없음')}catch(e){alert('불러오기 실패: '+e.message)}
};
const loadMapping=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    try{const proj=JSON.parse(ev.target.result);
    if(proj.mapping){setMapping(proj.mapping);
      const um=calcVars.filter(v=>v.required&&!proj.mapping[v.key]).map(v=>v.key);
      setUnmatched(um);alert(`매핑 불러오기 완료: ${Object.values(proj.mapping).filter(Boolean).length}개 연결`);
    }else alert('유효한 매핑 파일이 아닙니다')}catch(err){alert('파일 오류: '+err.message)}
  };r.readAsText(f);e.target.value='';
};

// Calc 실행 (variable_mapping 포함)
const runCalc=async()=>{
  if(!selFiles.size){alert('Merged 파일을 선택하세요');return}
  // 필수 누락 경고
  if(unmatched.length){
    const msg=`필수 변수 ${unmatched.length}개가 매핑되지 않았습니다:\n\n${unmatched.join(', ')}\n\n일부 계산이 생략될 수 있습니다. 계속하시겠습니까?`;
    if(!confirm(msg))return;
  }
  const expData=(exp.load_kg&&exp.imc_kg&&exp.fmc_kg)?{load_kg:+exp.load_kg,imc_kg:+exp.imc_kg,fmc_kg:+exp.fmc_kg}:null;
  const vm={};Object.entries(mapping).forEach(([k,v])=>{if(v&&v!==k)vm[k]=v});
  try{
    const r=await fetch(`${API}/api/calculate`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sid||null,config:cfg,source_files:[...selFiles],experimental:expData,variable_mapping:Object.keys(vm).length?vm:null})});
    const d=await r.json();
    if(d.session_id&&!sid){setSid(d.session_id);setCalcSid(d.session_id)}
    else{setCalcSid(sid)}
    setPoll(true);
  }catch(e){alert(e.message)}};

useEffect(()=>{if(!poll)return;const s=calcSid||sid;if(!s)return;const id=setInterval(async()=>{try{const r=await fetch(`${API}/api/status/${s}`);const d=await r.json();setSt(d);if(d.status==='done'||d.status==='error')setPoll(false)}catch(e){console.error(e)}},800);pr.current=id;return()=>clearInterval(id)},[poll,calcSid,sid]);

const matchedCount=Object.values(mapping).filter(Boolean).length;
const categories=[...new Set(calcVars.map(v=>v.category))];

return(<div>

  {/* 파일 선택 */}
  <div className="cd">
    <div className="ct">입력 파일 선택 (_merged.csv)</div>

    {/* 로컬 파일 불러오기 */}
    <LocalImport onImported={()=>loadResults()}/>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,marginTop:12}}>
      <span className="it">{results.length}개 파일 — {selFiles.size}개 선택</span>
      <div style={{display:'flex',gap:6}}>
        <button className="bt bs" onClick={()=>setSelFiles(new Set(results.map(r=>r.name)))}>전체</button>
        <button className="bt bs" onClick={()=>setSelFiles(new Set())}>해제</button>
        <button className="bt bs" onClick={loadResults}>새로고침</button>
      </div>
    </div>
    {results.length>0?<div className="file-sel">{results.map(f=><div key={f.name} className="file-sel-item">
      <input type="checkbox" checked={selFiles.has(f.name)} onChange={()=>togFile(f.name)}/>
      <span style={{flex:1}}>{f.name}</span>
      <span className="it">{(f.size/1024).toFixed(0)} KB</span>
    </div>)}</div>:<div className="it" style={{padding:16,textAlign:'center'}}>Merged 파일이 없습니다. 아래 경로에서 불러오거나 Merge를 먼저 실행하세요.</div>}
  </div>

  {/* 변수 매핑 패널 */}
  {calcVars.length>0&&<div className="cd">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setMapOpen(p=>!p)}>
      <div className="ct" style={{margin:0}}>변수 매핑 (Merged → Calc)</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <span className="it">{matchedCount}/{calcVars.length}개 연결</span>
        {unmatched.length>0&&<span style={{fontSize:11,padding:'2px 8px',borderRadius:10,background:'rgba(239,68,68,.1)',color:'var(--red)'}}>필수 {unmatched.length}개 누락</span>}
        <span style={{fontSize:10,color:'var(--tx3)',transition:'.2s',transform:mapOpen?'rotate(180deg)':''}}>▼</span>
      </div>
    </div>

    {mapOpen&&<div style={{marginTop:14}}>
      {/* 툴바 */}
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:10,flexWrap:'wrap'}}>
        {firstSel&&<button className="bt bs bp" onClick={()=>autoMap(firstSel)}>자동 매핑</button>}
        <span className="it">merged: {mergedCols.length}개 컬럼</span>
        <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          <button className="bt bs" onClick={saveMappingDefault} style={{borderColor:'var(--teal)',color:'var(--teal)',fontSize:10}}>⭐ 디폴트 저장</button>
          <button className="bt bs" onClick={loadMappingDefault} style={{color:'var(--teal)',fontSize:10}}>⭐ 디폴트 불러오기</button>
          <SaveSlots category="calc" label="세이브 슬롯"
            getData={()=>({type:'calc_mapping',mapping})}
            onLoad={d=>{if(d.mapping){setMapping(d.mapping);
              const um=calcVars.filter(v=>v.required&&!d.mapping[v.key]).map(v=>v.key);setUnmatched(um);
              alert(`매핑 불러오기: ${Object.values(d.mapping).filter(Boolean).length}개 연결`)}}}/>
        </div>
      </div>

      {/* 매핑 테이블 (카테고리별) */}
      {categories.map(cat=>(
        <div key={cat} style={{marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--teal)',fontWeight:500,marginBottom:6,paddingLeft:4}}>{cat}</div>
          <div style={{border:'1px solid var(--bd)',borderRadius:8,overflow:'hidden'}}>
            {calcVars.filter(v=>v.category===cat).map(v=>{
              const matched=mapping[v.key];
              const isMissing=v.required&&!matched;
              return(<div key={v.key} style={{display:'grid',gridTemplateColumns:'1fr 30px 1fr',gap:0,padding:'6px 12px',borderTop:'1px solid var(--bd)',alignItems:'center',background:isMissing?'rgba(239,68,68,.04)':'transparent'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontFamily:'var(--mono)',fontSize:11}}>{v.key}</span>
                  {v.required&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:8,background:'rgba(239,68,68,.1)',color:'var(--red)'}}>필수</span>}
                  <span style={{fontSize:10,color:'var(--tx3)'}}>{v.label}</span>
                </div>
                <span style={{textAlign:'center',color:'var(--tx3)',fontSize:11}}>←</span>
                <select value={matched||''} onChange={e=>setMap(v.key,e.target.value)} style={{fontSize:11,padding:'4px 6px',background:matched?'var(--bg)':'rgba(239,68,68,.06)',borderColor:isMissing?'rgba(239,68,68,.3)':'var(--bd2)',color:'var(--tx)'}}>
                  <option value="" style={{background:'#fff',color:'#1a1a2e'}}>— 미연결 —</option>
                  {mergedCols.map(c=><option key={c} value={c} style={{background:'#fff',color:'#1a1a2e'}}>{c}</option>)}
                </select>
              </div>)})}
          </div>
        </div>
      ))}
    </div>}
  </div>}

  {/* 실험 입력값 */}
  <div className="cd">
    <div className="ct">실험 입력값 (선택사항)</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
      <div><label style={{fontSize:11,color:'var(--tx2)',display:'block',marginBottom:4}}>건조부하 [kg]</label><input value={exp.load_kg} onChange={e=>setExp(p=>({...p,load_kg:e.target.value}))} placeholder="3.0" style={{width:'100%'}}/></div>
      <div><label style={{fontSize:11,color:'var(--tx2)',display:'block',marginBottom:4}}>초기 함수율 무게 [kg]</label><input value={exp.imc_kg} onChange={e=>setExp(p=>({...p,imc_kg:e.target.value}))} placeholder="4.8" style={{width:'100%'}}/></div>
      <div><label style={{fontSize:11,color:'var(--tx2)',display:'block',marginBottom:4}}>최종 함수율 무게 [kg]</label><input value={exp.fmc_kg} onChange={e=>setExp(p=>({...p,fmc_kg:e.target.value}))} placeholder="3.15" style={{width:'100%'}}/></div>
    </div>
  </div>

  {/* Calc 실행 */}
  <div className="cd">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div className="ct" style={{margin:0}}>Calculation 실행</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        {st&&<span className="sb" style={{background:st.status==='done'?'rgba(34,197,94,.1)':st.status==='processing'?'rgba(74,158,255,.1)':st.status==='error'?'rgba(239,68,68,.1)':'rgba(245,158,11,.1)',color:st.status==='done'?'var(--green)':st.status==='processing'?'var(--blue)':st.status==='error'?'var(--red)':'var(--amber)'}}>{st.status}</span>}
        <button className="bt bg" onClick={runCalc} disabled={st?.status==='processing'||!selFiles.size}>{st?.status==='processing'?'계산 중...':'Calculation 실행'}</button>
      </div>
    </div>
    <div className="it" style={{marginBottom:8}}>_merged.csv → 변수 매핑({matchedCount}개) → CoolProp 물성 → 열전달/유량/성능 → <strong>_calc.csv</strong></div>
    {st&&<StatusPanel st={st} resultKey="calc_results"/>}
    {st?.status==='done'&&st?.calc_results?.length>0&&<div style={{marginTop:10}}>
      <button className="bt bg" onClick={()=>{
        // merged + calc 파일명 수집
        const calcFiles=st.calc_results||[];
        const mergedFiles=(st.merge_results||[]).length?st.merge_results:calcFiles.map(f=>f.replace('_calc.csv','_merged.csv'));
        const allFiles=[...new Set([...calcFiles,...mergedFiles])];
        setViewerAutoLoad(allFiles);
        setTab('viewer');
      }} style={{background:'var(--teal)',borderColor:'var(--teal)'}}>📊 Viewer에서 보기 →</button>
      <span className="it" style={{marginLeft:8}}>merged + calc 병합하여 Viewer에 자동 로드</span>
    </div>}
  </div>
</div>)}

// ═══ 설정 탭 ═══
// ═══ ErrorBoundary (렌더 에러 캐치) ═══
class ErrorBound extends React.Component{
  constructor(p){super(p);this.state={err:null,info:null}}
  static getDerivedStateFromError(e){return{err:e}}
  componentDidCatch(e,info){this.setState({info});console.error('ErrorBound:',e,info)}
  render(){if(this.state.err)return React.createElement('div',{style:{padding:16,margin:8,background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10}},
    React.createElement('div',{style:{fontSize:14,fontWeight:500,color:'#ef4444',marginBottom:8}},'⚠️ 렌더링 오류'),
    React.createElement('pre',{style:{fontSize:11,color:'#ef4444',whiteSpace:'pre-wrap',fontFamily:'var(--mono)'}},String(this.state.err)),
    React.createElement('button',{onClick:()=>this.setState({err:null,info:null}),style:{marginTop:8,padding:'4px 12px',borderRadius:6,border:'1px solid #ef4444',background:'transparent',color:'#ef4444',cursor:'pointer'}},'다시 시도'));
  return this.props.children}
}

function smSMA(a,w){const n=a.length,o=new Float64Array(n),h=w>>1;for(let i=0;i<n;i++){const lo=Math.max(0,i-h),hi=Math.min(n-1,i+h);let s=0;for(let j=lo;j<=hi;j++)s+=a[j];o[i]=s/(hi-lo+1)}return Array.from(o)}
function smEMA(a,w){const al=2/(w+1),o=new Float64Array(a.length);o[0]=a[0];for(let i=1;i<a.length;i++)o[i]=al*a[i]+(1-al)*o[i-1];return Array.from(o)}
function vSmooth(a,m,w){return m==='EMA'?smEMA(a,w):smSMA(a,w)}
const P_ATM=101325;
function psatW(T){return T<0?611.2*Math.exp(22.46*T/(272.62+T)):611.2*Math.exp(17.67*T/(T+243.5))}
function wFromRH(T,RH){const pw=RH*psatW(T),pa=P_ATM-pw;return pa>0?.62198*pw/pa:0}
function hMoist(T,W){return 1.006*T+W*(2501+1.86*T)}
function rhFromAH(W,T){const ws=wFromRH(T,1);return ws>0?Math.min(1,W/ws):0}
function dewPt(W){const pw=W*P_ATM/(.62198+W);if(pw<=0)return-50;return pw<611.2?272.62*Math.log(pw/611.2)/(22.46-Math.log(pw/611.2)):243.5*Math.log(pw/611.2)/(17.67-Math.log(pw/611.2))}
function specVol(T,W){return(8.3145/28.9645*(T+273.15))*(1+1.6078*W)/P_ATM*1000}

  return out;
})();

const[files,setFiles]=useState([]);
const[selFiles,setSelFiles]=useState(new Set());
const[cases,setCases]=useState([]);  // [{name,data:{col:[...]}}]
const[caseVis,setCaseVis]=useState({});

const[xGap,setXGap]=useState(.10);
const[yGap,setYGap]=useState(.18);
const[dragMode,setDragMode]=useState('xy');
const[chartH,setChartH]=useState(750);
const[chartW,setChartW]=useState(0);

// 파일 목록 로드 (모든 CSV)
const reloadFiles=()=>fetch(`${API}/api/results`).then(r=>r.json()).then(d=>setFiles(d.filter(f=>f.name.includes('_calc')||f.name.includes('_merged')))).catch(()=>{});
useEffect(()=>{reloadFiles()},[]);

// autoLoad: Calc 완료 후 자동 로드
const[pendingLoad,setPendingLoad]=useState(false);
useEffect(()=>{if(!autoLoad?.length)return;
  fetch(`${API}/api/results`).then(r=>r.json()).then(d=>{
    const filtered=d.filter(f=>f.name.includes('_calc')||f.name.includes('_merged'));
    setFiles(filtered);
    const toSel=new Set(autoLoad.filter(fn=>filtered.some(f=>f.name===fn)));
    setSelFiles(toSel);
    setMergeMode('all'); // Calc 세션 파일은 전부 하나로
    if(clearAutoLoad)clearAutoLoad();
    setPendingLoad(true);
  }).catch(()=>{});
},[autoLoad]);

const[mergeMode,setMergeMode]=useState('auto'); // 'auto' | 'all' | 'each'

// 데이터 로드
const[loadMsg,setLoadMsg]=useState('');
const[dbg,setDbg]=useState('');
const loadData=async()=>{if(!selFiles.size)return;setLoading(true);setLoadMsg('');setDbg('');
  const logs=[];const errs=[];

  // ── 그룹핑 ──
  const groups=new Map(); // groupName → [fn, fn, ...]
  if(mergeMode==='all'){
    // 전부 한 케이스
    groups.set('All_merged',[...selFiles]);
  }else if(mergeMode==='each'){
    // 파일별 개별
    for(const fn of selFiles)groups.set(fn.replace(/\.csv$/,''),[fn]);
  }else{
    // auto: 1차 source_dir, 2차 base명으로 그룹핑
    const fileInfo=new Map();files.forEach(f=>fileInfo.set(f.name,f));
    const baseMap=new Map(); // groupKey → [fn]
    for(const fn of selFiles){
      const f=fileInfo.get(fn);
      let key;
      if(f?.source_dir){
        // source_dir 있으면 폴더 기준
        key='dir:'+f.source_dir;
      }else{
        // source_dir 없으면 base명 기준 (_calc/_merged 제거)
        key='base:'+fn.replace(/_calc\.csv$/,'').replace(/_merged\.csv$/,'').replace(/\.csv$/,'');
      }
      if(!baseMap.has(key))baseMap.set(key,[]);
      baseMap.get(key).push(fn);
    }
    for(const[key,fns] of baseMap){
      // 그룹명: 폴더명 또는 base명
      let gn;
      if(key.startsWith('dir:')){
        const dir=key.slice(4);
        gn=dir.includes('/')||dir.includes('\\')?dir.split(/[\\/]/).pop():dir;
      }else{
        gn=key.slice(5); // 'base:' 제거
      }
      if(baseMap.size>1&&groups.has(gn))gn+='_'+(groups.size+1);
      groups.set(gn,fns);
    }
  }
  logs.push(`모드: ${mergeMode}, ${groups.size}그룹`);

  const arr=[];
  for(const[groupName,fileList] of groups){
    logs.push(`\n[${groupName}] 파일 ${fileList.length}개`);
    const merged={};let totalRows=0;const allCols=new Set();
    // calc 먼저 (계산 결과 우선)
    const sorted=[...fileList].sort((a,b)=>(b.includes('_calc')?1:0)-(a.includes('_calc')?1:0));
    for(const fn of sorted){
      try{
        const r=await fetch(`${API}/api/viewer-data/${fn}`);
        if(!r.ok){errs.push(`${fn}: ${r.status}`);continue}
        const txt=await r.text();
        let d;try{d=JSON.parse(txt)}catch(pe){errs.push(`${fn}: JSON파싱실패`);continue}
        if(!d.data||!d.columns?.length)continue;
        let nc=0;
        for(const col of d.columns){if(!merged[col]){merged[col]=d.data[col];allCols.add(col);nc++}}
        totalRows=Math.max(totalRows,d.rows);
        logs.push(`  + ${fn}: ${d.columns.length}col (${nc}신규), ${d.rows}rows`);
      }catch(e){errs.push(`${fn}: ${e.message}`)}
    }
    if(!Object.keys(merged).length){errs.push(`${groupName}: 데이터 없음`);continue}

    // ── 후처리 ──
    const D=merged;const added=[];
    if(!D.AH_Eva_In&&D.T_Air_Eva_In&&D.RH_Eva_In){
      D.AH_Eva_In=D.T_Air_Eva_In.map((t,i)=>t!=null&&D.RH_Eva_In[i]!=null?+wFromRH(t,D.RH_Eva_In[i]).toFixed(5):null);added.push('AH_Eva_In');
    }
    const tEO=D.T_Air_Eva_Out||D.T_Eva_Out;
    if(!D.AH_Cond_In&&tEO){
      D.AH_Cond_In=tEO.map((t,i)=>{if(t==null)return null;const rh=D.RH_Eva_Out?.[i]??0.95;return+wFromRH(t,rh).toFixed(5)});added.push('AH_Cond_In');
      if(!D.T_Air_Eva_Out&&D.T_Eva_Out){D.T_Air_Eva_Out=[...D.T_Eva_Out];added.push('T_Air_Eva_Out')}
    }
    if(!D.AH_Cond_Out&&D.AH_Cond_In){D.AH_Cond_Out=[...D.AH_Cond_In];added.push('AH_Cond_Out')}
    if(!D.h_Comp_In_ref&&D.P_Comp_In&&(D.T_Comp_In||D.T_Eva_Out)){
      try{
        const body={T_Comp_In:D.T_Comp_In||D.T_Eva_Out,T_Comp_Out:D.T_Comp_Out||D.T_Cond_In,T_Cond_Out:D.T_Cond_Out,P_Comp_In:D.P_Comp_In,P_Comp_Out:D.P_Comp_Out,refrigerant:cfg?.environment?.refrigerant||'R290',patm:cfg?.environment?.patm||101.325};
        const hr=await fetch(`${API}/api/compute-enthalpy`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(hr.ok){const hd=await hr.json();
          if(hd.h_Comp_In){D.h_Comp_In_ref=hd.h_Comp_In;added.push('h_Comp_In_ref')}
          if(hd.h_Comp_Out){D.h_Comp_Out_ref=hd.h_Comp_Out;added.push('h_Comp_Out_ref')}
          if(hd.h_Cond_Out){D.h_Cond_Out_ref=hd.h_Cond_Out;D.h_Eva_In_ref=hd.h_Cond_Out;added.push('h_Cond_Out_ref','h_Eva_In_ref')}
        }
      }catch(e){logs.push(`  P-h 실패: ${e.message}`)}
    }
    added.forEach(k=>allCols.add(k));
    if(added.length)logs.push(`  자동계산: ${added.join(', ')}`);
    // 주요 선도 컬럼 체크
    const psychCk=['T_Air_Eva_In','AH_Eva_In','AH_Cond_In','T_Air_Cond_Out','AH_Cond_Out'].map(k=>allCols.has(k)?'✓':'✗');
    logs.push(`  습공기: ${psychCk.join(' ')}`);
    logs.push(`  → ${groupName}: ${allCols.size}col, ${totalRows}rows`);
    arr.push({name:groupName,data:D,columns:[...allCols],rows:totalRows});
  }
  logs.push(`\n총 ${arr.length}건`);setDbg(logs.join('\n'));
  setCases(arr);const v={};arr.forEach(c=>v[c.name]=true);setCaseVis(v);setLoading(false);
  if(arr.length)setLoadMsg(`✅ ${arr.length}개 케이스 (${arr.reduce((s,c)=>s+c.rows,0)}행)`);
  if(errs.length)setLoadMsg(m=>(m?m+' / ':'')+'❌ '+errs.join(', '));
};

    <SaveSlots category="viewer" label="슬롯"
      getData={()=>({type:'viewer_settings',lw,xGap,yGap,chartH,chartW,dragMode})}
      onLoad={d=>{if(d.lw!=null)setLw(d.lw);if(d.xGap!=null)setXGap(d.xGap);if(d.yGap!=null)setYGap(d.yGap);if(d.chartH!=null)setChartH(d.chartH);if(d.chartW!=null)setChartW(d.chartW);if(d.dragMode!=null)setDragMode(d.dragMode)}}/>
  </div>

  <ErrorBound>
  {sub==='chart'&&<VwChart cases={cases} caseVis={caseVis} lw={lw} chartH={chartH} chartW={chartW} dragMode={dragMode} xGap={xGap} yGap={yGap}/>}
  {sub==='psych'&&<VwPsych cases={cases} caseVis={caseVis} lw={lw} chartH={chartH} chartW={chartW} dragMode={dragMode}/>}
  {sub==='ph'&&<VwPh cases={cases} caseVis={caseVis} lw={lw} chartH={chartH} chartW={chartW} dragMode={dragMode} cfg={cfg}/>}
  </ErrorBound>
  </>}
</div>)}
